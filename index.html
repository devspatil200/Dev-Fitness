<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DevFit Coach – Devidas Patil</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- PWA Manifest (Base64) -->
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiRGV2Rml0IENvYWNoIiwic2hvcnRfbmFtZSI6IkRldkZpdCIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGYxNzJhIiwidGhlbWVfY29sb3IiOiIjMTBiZjgxIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vdmlhLnBsYWNlaG9sZGVyLmNvbS8xOTIiLCJzaXplcyI6IjE5MngxOTIiLCJ0eXBlIjoiaW1hZ2UvcG5nIn1dfQ==">
  <meta name="theme-color" content="#10b981">
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    .hidden { display: none !important; }
    input, select, button { outline: none; }
    input:focus, select:focus { ring: 2px; ring-color: #10b981; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
  <div id="app" class="w-full max-w-md bg-slate-800 rounded-2xl p-6 shadow-2xl border border-slate-700">
    <!-- UI Injected Here -->
  </div>

  <script>
    // 🔑 STEP 1: तुमच्या Supabase project ची keys इथे paste करा
    const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE';

    let supabase;
    let isDemo = false;
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      if (SUPABASE_URL.includes('YOUR_PROJECT')) isDemo = true;
    } catch(e) { isDemo = true; }

    // State
    let user = JSON.parse(localStorage.getItem('devfit_user') || 'null');
    let profile = JSON.parse(localStorage.getItem('devfit_profile') || '{"role":"client"}');
    let logs = JSON.parse(localStorage.getItem('devfit_logs') || '[]');

    const app = document.getElementById('app');

    // 🎨 Render Functions
    function render() {
      if (!user) return renderAuth();
      if (profile.role === 'coach') return renderCoachDashboard();
      return renderClientDashboard();
    }
    function renderAuth() {
      app.innerHTML = `
        <h1 class="text-2xl font-bold mb-2 text-emerald-400 text-center">DevFit Coach</h1>
        <p class="text-gray-400 mb-6 text-center text-sm">Devidas Patil – Advanced Fitness Tracking</p>
        <input id="email" type="email" placeholder="Email" class="w-full p-3 rounded-lg bg-slate-700 mb-3 text-white border border-slate-600">
        <input id="password" type="password" placeholder="Password" class="w-full p-3 rounded-lg bg-slate-700 mb-3 text-white border border-slate-600">
        <select id="role" class="w-full p-3 rounded-lg bg-slate-700 mb-3 text-white border border-slate-600">
          <option value="client">Client (मी workout करतो)</option>
          <option value="coach">Coach (मी plan देतो)</option>
        </select>
        <div class="flex gap-3">
          <button onclick="handleLogin()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 p-3 rounded-lg font-semibold transition">Login</button>
          <button onclick="handleSignup()" class="flex-1 bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-semibold transition">Sign Up</button>
        </div>
        <p id="auth-msg" class="text-sm text-center mt-3 h-5"></p>
        ${isDemo ? '<p class="text-xs text-yellow-400 mt-2 text-center">⚠️ Demo Mode Active. Supabase keys add करा for real sync.</p>' : ''}
      `;
    }

    function renderClientDashboard() {
      app.innerHTML = `
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-emerald-400">🏋️ Workout Log</h2>
          <button onclick="logout()" class="text-sm text-red-400 hover:underline px-2 py-1 bg-slate-700 rounded">Logout</button>
        </div>
        <div class="bg-slate-700 p-4 rounded-lg mb-4 space-y-3">
          <input id="exercise" placeholder="Exercise (e.g., Bench Press)" class="w-full p-2 rounded bg-slate-600 text-white">
          <div class="flex gap-2">
            <input id="sets" type="number" placeholder="Sets" class="w-1/3 p-2 rounded bg-slate-600 text-white">
            <input id="reps" type="number" placeholder="Reps" class="w-1/3 p-2 rounded bg-slate-600 text-white">
            <input id="rpe" type="number" placeholder="RPE" class="w-1/3 p-2 rounded bg-slate-600 text-white">
          </div>
          <button onclick="addLog()" class="w-full bg-emerald-600 hover:bg-emerald-700 p-2 rounded font-semibold transition">💾 Save Log</button>
        </div>
        <div id="logs-list" class="space-y-2 max-h-64 overflow-y-auto"></div>
      `;
      renderLogs();
    }

    function renderCoachDashboard() {
      app.innerHTML = `
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-blue-400">👨‍🏫 Coach Panel</h2>
          <button onclick="logout()" class="text-sm text-red-400 hover:underline px-2 py-1 bg-slate-700 rounded">Logout</button>
        </div>
        <div class="bg-slate-700 p-4 rounded-lg mb-4">
          <h3 class="font-semibold mb-2 text-emerald-300">📊 Client Activity</h3>
          <p class="text-gray-400 text-sm mb-3">Real-time sync requires Supabase keys. Currently viewing local demo data.</p>
          <div class="grid grid-cols-2 gap-2 text-center">            <div class="bg-slate-800 p-2 rounded"><div class="text-xl font-bold text-white">${logs.length}</div><div class="text-xs text-gray-400">Total Logs</div></div>
            <div class="bg-slate-800 p-2 rounded"><div class="text-xl font-bold text-white">0</div><div class="text-xs text-gray-400">Active Clients</div></div>
          </div>
        </div>
        <div id="coach-logs" class="space-y-2 max-h-64 overflow-y-auto"></div>
      `;
      document.getElementById('coach-logs').innerHTML = logs.length ? 
        logs.slice().reverse().map(l => `
          <div class="bg-slate-600 p-3 rounded flex justify-between items-center">
            <div>
              <div class="font-semibold">${l.exercise}</div>
              <div class="text-sm text-gray-400">${l.sets}x${l.reps} • RPE ${l.rpe} • ${new Date(l.date).toLocaleDateString()}</div>
            </div>
          </div>
        `).join('') : '<p class="text-gray-400 text-center py-4">No logs recorded yet.</p>';
    }

    function renderLogs() {
      const list = document.getElementById('logs-list');
      if (!list) return;
      list.innerHTML = logs.length ? 
        logs.slice().reverse().map((l, i) => `
          <div class="bg-slate-700 p-3 rounded-lg flex justify-between items-center">
            <div>
              <div class="font-semibold">${l.exercise}</div>
              <div class="text-sm text-gray-400">${l.sets}x${l.reps} • RPE: ${l.rpe} • ${new Date(l.date).toLocaleDateString()}</div>
            </div>
            <button onclick="deleteLog(${logs.length - 1 - i})" class="text-red-400 text-xs hover:text-red-300 px-2">✕</button>
          </div>
        `).join('') : '<p class="text-gray-400 text-center py-4">No logs recorded yet.</p>';
    }

    // 🔐 Auth Actions
    async function handleSignup() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const role = document.getElementById('role').value;
      if (!email || !password) return showAuthMsg('Please enter email & password', true);
      if (isDemo) { showAuthMsg('Demo mode: Use any email/password to continue.', false); setTimeout(()=>{ user={id:'demo',email}; profile.role=role; saveState(); render(); }, 500); return; }
      
      const { error } = await supabase.auth.signUp({ email, password, options: { data: { role } } });
      if (error) showAuthMsg(error.message, true);
      else showAuthMsg('✅ Account created! Check email to verify.', false);
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return showAuthMsg('Please enter credentials', true);
      if (isDemo) { showAuthMsg('Demo mode active. Logging in...', false); setTimeout(()=>{ user={id:'demo',email}; profile.role='client'; saveState(); render(); }, 500); return; }
      const { error, data } = await supabase.auth.signInWithPassword({ email, password });
      if (error) showAuthMsg(error.message, true);
      else { user = data.user; profile.role = data.user.user_metadata?.role || 'client'; saveState(); render(); }
    }

    function showAuthMsg(msg, isError) {
      const el = document.getElementById('auth-msg');
      el.textContent = msg;
      el.className = `text-sm text-center mt-3 h-5 ${isError ? 'text-red-400' : 'text-emerald-400'}`;
    }

    function logout() {
      user = null;
      localStorage.removeItem('devfit_user');
      render();
    }

    function saveState() {
      localStorage.setItem('devfit_user', JSON.stringify(user));
      localStorage.setItem('devfit_profile', JSON.stringify(profile));
    }

    // 📝 Log Actions
    function addLog() {
      const exercise = document.getElementById('exercise').value.trim();
      const sets = document.getElementById('sets').value;
      const reps = document.getElementById('reps').value;
      const rpe = document.getElementById('rpe').value;
      if (!exercise || !sets || !reps) return alert('Exercise, Sets & Reps आवश्यक आहेत.');
      
      logs.push({ exercise, sets, reps, rpe, date: new Date().toISOString() });
      localStorage.setItem('devfit_logs', JSON.stringify(logs));
      
      // Reset inputs
      document.getElementById('exercise').value = '';
      document.getElementById('sets').value = '';
      document.getElementById('reps').value = '';
      document.getElementById('rpe').value = '';
      renderLogs();
    }

    function deleteLog(index) {
      logs.splice(index, 1);
      localStorage.setItem('devfit_logs', JSON.stringify(logs));
      renderLogs();
    }

    // 🚀 Init
    render();  </script>
</body>
</html>
