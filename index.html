function calcBMI(h,w){if(!h||!w)return null;return(parseFloat(w)/Math.pow(parseFloat(h)/100,2)).toFixed(1);}
function bmiInfo(b){const n=parseFloat(b);if(n<18.5)return{label:"Underweight",color:"#f59e0b"};if(n<25)return{label:"Normal ✅",color:"#16a34a"};if(n<30)return{label:"Overweight",color:"#f97316"};return{label:"Obese",color:"#ef4444"};}
function daysSince(d){return Math.max(1,Math.floor((new Date()-new Date(d))/86400000)+1);}
function getPhase(day,lang){if(lang==="mr"){if(day<=7)return"पाया";if(day<=14)return"वाढ";if(day<=21)return"तीव्रता";if(day<=28)return"शिखर";return"आढावा";}if(day<=7)return"Foundation";if(day<=14)return"Building";if(day<=21)return"Intensity";if(day<=28)return"Peak";return"Assessment";}
function genCode(){return"DEV"+Math.floor(1000+Math.random()*9000);}

function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function F({label,children}){return <div style={{marginBottom:"18px"}}><div style={{fontSize:"14px",fontWeight:"700",color:"#374151",marginBottom:"8px"}}>{label}</div>{children}</div>;}

            <div style={{fontSize:"44px",fontWeight:"900"}}>Day {day}</div>
            <div style={{fontSize:"14px",color:"#bfdbfe"}}>{phase}</div>
            <div style={{background:"rgba(255,255,255,0.2)",borderRadius:"8px",height:"8px",marginTop:"12px",overflow:"hidden"}}><div style={{background:"#fff",height:"100%",width:`${(day/30)*100}%`,borderRadius:"8px"}}/></div>
            <div style={{fontSize:"11px",color:"#bfdbfe",marginTop:"4px"}}>{day}/30 {t.dayOf}</div>
          </div>}
          <button onClick={()=>ready&&getDailyPlan()} disabled={!ready} style={{width:"100%",border:"none",borderRadius:"14px",padding:"16px",fontSize:"16px",fontWeight:"700",cursor:ready?"pointer":"not-allowed",background:ready?"#1e40af":"#d1d5db",color:"#fff"}}>{t.seePlan}</button>
        </div>
      </div>
    );
  }

  if(screen==="daily-result"&&dailyPlan){
    const day=dailyPlan.day;
    const doneMsg=`Day ${day} complete!\nDevFit Coach - ${dtName}\nGoal: ${GK[dtGoal]||dtGoal}\n${profile.name}: ${profile.whatsapp||"9823438787"}`;
    const ml=t.mealLabels;
    const meals=[["🌅",ml.earlyMorning,dailyPlan.diet?.earlyMorning],["🍽️",ml.breakfast,dailyPlan.diet?.breakfast],["🍱",ml.lunch,dailyPlan.diet?.lunch],["🫖",ml.eveningSnack,dailyPlan.diet?.eveningSnack],["🌙",ml.dinner,dailyPlan.diet?.dinner]];
    return(
      <div style={{background:"#f8fafc",minHeight:"100vh",paddingBottom:"32px"}}>
        <div style={{background:"linear-gradient(135deg,#1e40af,#3b82f6)",padding:"20px 16px",color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><button onClick={()=>setScreen("daily-training")} style={{background:"none",border:"none",color:"rgba(255,255,255,0.8)",fontSize:"14px",cursor:"pointer",padding:0,marginBottom:"6px",display:"block"}}>{t.back}</button><h1 style={{margin:"0 0 2px",fontSize:"22px",fontWeight:"800"}}>Day {day} 💪</h1><p style={{margin:0,fontSize:"13px",color:"#bfdbfe"}}>{dtName} • {dailyPlan.phase}</p></div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"8px"}}><LT/><div style={{background:"rgba(255,255,255,0.2)",borderRadius:"12px",padding:"8px 14px",textAlign:"center"}}><div style={{fontSize:"18px",fontWeight:"800"}}>{day}/30</div></div></div>
          </div>
          {dailyPlan.motivation&&<p style={{margin:"10px 0 0",fontSize:"13px",color:"#bfdbfe",fontStyle:"italic"}}>💬 "{dailyPlan.motivation}"</p>}
        </div>
        <div style={{display:"flex",background:"#fff",borderBottom:"3px solid #e5e7eb"}}>
          {[["workout",t.todayWorkout,"#1e40af"],["diet",t.todayDiet,"#15803d"]].map(([k,lb,ac])=>(
            <button key={k} onClick={()=>setDailyTab(k)} style={{flex:1,padding:"16px 4px",border:"none",background:"none",fontSize:"14px",fontWeight:dailyTab===k?"800":"500",color:dailyTab===k?ac:"#9ca3af",borderBottom:`4px solid ${dailyTab===k?ac:"transparent"}`,cursor:"pointer",marginBottom:"-3px"}}>{lb}</button>
          ))}
        </div>
        <div style={{padding:"16px"}}>
          {dailyTab==="workout"&&<div>
            <div style={{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",overflow:"hidden",marginBottom:"12px"}}>
              <div style={{padding:"12px 16px",background:"#eff6ff",borderBottom:"1px solid #dbeafe"}}><div style={{fontWeight:"700",color:"#1e40af",fontSize:"14px"}}>⏱️ {t.warmup} + {dailyPlan.workout?.duration}</div></div>
              <div style={{padding:"12px 16px",borderBottom:"1px solid #f3f4f6",fontSize:"13px",color:"#6b7280"}}>🔥 {dailyPlan.workout?.warmup}</div>
              {(dailyPlan.workout?.exercises||[]).map((ex,i)=>(
                <div key={i} style={{padding:"12px 16px",borderBottom:i<(dailyPlan.workout.exercises.length-1)?"1px solid #f3f4f6":"none",display:"flex",alignItems:"center",gap:"12px"}}>
                  <div style={{width:"28px",height:"28px",borderRadius:"50%",background:"#dbeafe",color:"#1e40af",fontSize:"13px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                  <span style={{fontSize:"14px",color:"#374151",fontWeight:"500"}}>{ex}</span>
                </div>
              ))}
              {dailyPlan.workout?.cooldown&&<div style={{padding:"12px 16px",background:"#f8fafc",fontSize:"13px",color:"#6b7280"}}>🧘 {t.cooldown}: {dailyPlan.workout.cooldown}</div>}
            </div>
            {dailyPlan.workout?.tip&&<div style={{background:"#eff6ff",borderRadius:"12px",padding:"12px 16px",fontSize:"13px",color:"#1e40af",marginBottom:"12px"}}>💡 <strong>{t.coachTip}</strong> {dailyPlan.workout.tip}</div>}
          </div>}
          {dailyTab==="diet"&&<div>
            <div style={{background:"#fef3c7",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",fontSize:"13px",color:"#92400e"}}>📌 {t.todayDietNote}</div>
            <div style={{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",overflow:"hidden"}}>
              {meals.map(([ic,lb,val],i)=>val&&<div key={i} style={{padding:"14px 16px",borderBottom:i<meals.length-1?"1px solid #f3f4f6":"none",display:"flex",gap:"12px",alignItems:"flex-start"}}><span style={{fontSize:"20px",flexShrink:0}}>{ic}</span><div><div style={{fontSize:"11px",color:"#9ca3af",fontWeight:"700",textTransform:"uppercase"}}>{lb}</div><div style={{fontSize:"14px",color:"#374151",marginTop:"3px",lineHeight:"1.5"}}>{val}</div></div></div>)}
            </div>
          </div>}
          <div style={{marginTop:"16px"}}>
            {!dailyDone?<button onClick={()=>setDailyDone(true)} style={{width:"100%",background:"#16a34a",border:"none",borderRadius:"14px",padding:"16px",color:"#fff",fontSize:"16px",fontWeight:"700",cursor:"pointer"}}>{t.doneBtnText}</button>
            :<div style={{background:"#f0fdf4",border:"2px solid #16a34a",borderRadius:"16px",padding:"16px",textAlign:"center"}}>
              <div style={{fontSize:"28px",marginBottom:"6px"}}>🎉</div>
              <div style={{fontWeight:"700",color:"#15803d",marginBottom:"8px"}}>{t.congrats} {day} {t.congrats2}</div>
              <a href={waLink(profile.whatsapp||WA,doneMsg)} style={{display:"block",background:"#25D366",color:"#fff",fontWeight:"700",padding:"12px",borderRadius:"10px",textDecoration:"none",fontSize:"14px"}}>{t.progressWA}</a>
            </div>}
          </div>
          <button onClick={()=>setScreen("home")} style={{width:"100%",marginTop:"10px",background:"#f3f4f6",border:"none",borderRadius:"14px",padding:"14px",color:"#6b7280",fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>{t.home}</button>
        </div>
      </div>
    );
  }

  if(screen==="admin"){
    if(!adminAuth)return(
      <div style={{minHeight:"100vh",background:"#1f2937",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 20px"}}>
        <div style={{fontSize:"48px",marginBottom:"12px"}}>🔐</div>
        <h2 style={{color:"#fff",margin:"0 0 4px"}}>{t.adminLogin}</h2>
        <p style={{color:"#9ca3af",fontSize:"14px",marginBottom:"24px"}}>{t.adminOnly}</p>
        <input type="password" placeholder={t.enterPass} value={adminInput} onChange={e=>setAdminInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(adminInput===ADMIN_PASS?(setAdminAuth(true),setAdminErr("")):(setAdminErr(t.wrongPass)))} style={{width:"100%",maxWidth:"300px",border:"2px solid #374151",borderRadius:"12px",padding:"14px",fontSize:"16px",background:"#374151",color:"#fff",outline:"none",boxSizing:"border-box",marginBottom:"10px"}}/>
        {adminErr&&<p style={{color:"#f87171",fontSize:"13px",marginBottom:"8px"}}>{adminErr}</p>}
        <div style={{display:"flex",gap:"10px",width:"100%",maxWidth:"300px"}}>
          <button onClick={()=>setScreen("home")} style={{flex:1,background:"#374151",border:"none",borderRadius:"12px",padding:"14px",color:"#9ca3af",cursor:"pointer",fontSize:"14px"}}>{t.back}</button>
          <button onClick={()=>adminInput===ADMIN_PASS?(setAdminAuth(true),setAdminErr("")):(setAdminErr(t.wrongPass))} style={{flex:2,background:"#16a34a",border:"none",borderRadius:"12px",padding:"14px",color:"#fff",fontWeight:"700",cursor:"pointer",fontSize:"14px"}}>{t.loginBtn}</button>
        </div>
      </div>
    );
    const totalRev=clients.reduce((s,c)=>s+parseFloat(c.amount||0),0);
    const active=clients.filter(c=>c.status==="active").length;
    return(
      <div style={{background:"#f8fafc",minHeight:"100vh",paddingBottom:"40px"}}>
        <div style={{background:"linear-gradient(135deg,#1f2937,#374151)",padding:"20px 16px",color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><h2 style={{margin:0,fontSize:"18px",fontWeight:"700"}}>{t.adminTitle}</h2><p style={{margin:0,fontSize:"12px",color:"#9ca3af"}}>DevFit Coach</p></div>
            <div style={{display:"flex",gap:"8px"}}><LT/><button onClick={()=>setScreen("home")} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#9ca3af",padding:"8px 12px",borderRadius:"8px",cursor:"pointer",fontSize:"12px"}}>{t.home}</button></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"16px"}}>
            {[["₹"+totalRev.toLocaleString(),t.totalRev],[active,t.activeC],[clients.length,t.totalC]].map(([v,l])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.1)",borderRadius:"12px",padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:"16px",fontWeight:"700"}}>{v}</div><div style={{fontSize:"10px",color:"#9ca3af",marginTop:"2px"}}>{l}</div></div>
            ))}
          </div>
        </div>
        <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #e5e7eb"}}>
          {[["clients",t.clientsTab],["profile",t.profileTab],["settings",t.settingsTab]].map(([k,lb])=>(
            <button key={k} onClick={()=>setAdminTab(k)} style={{flex:1,padding:"12px 4px",border:"none",background:"none",fontSize:"12px",fontWeight:adminTab===k?"700":"500",color:adminTab===k?"#15803d":"#6b7280",borderBottom:`2px solid ${adminTab===k?"#15803d":"transparent"}`,cursor:"pointer",marginBottom:"-2px"}}>{lb}</button>
          ))}
        </div>
        <div style={{padding:"16px"}}>
          {adminTab==="clients"&&<div>
            {!addingClient?<button onClick={()=>setAddingClient(true)} style={{width:"100%",background:"#15803d",border:"none",borderRadius:"14px",padding:"14px",color:"#fff",fontWeight:"700",fontSize:"15px",cursor:"pointer",marginBottom:"16px"}}>{t.addClient}</button>
            :<div style={{background:"#fff",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:"16px"}}>
              <TI label="नाव / Name" type="text" placeholder="Client Name" value={newC.name} onChange={e=>setNewC({...newC,name:e.target.value})}/>
              <TI label="Phone" type="tel" placeholder="9876543210" value={newC.phone} onChange={e=>setNewC({...newC,phone:e.target.value})}/>
              <F label={t.planType}><div style={{display:"flex",gap:"8px"}}>{[["perplan","Per Plan (₹699)"],["monthly","Monthly (₹1,499)"]].map(([k,l])=><button key={k} onClick={()=>setNewC({...newC,planType:k,amount:k==="monthly"?"1499":"699"})} style={{flex:1,padding:"10px 4px",border:`2px solid ${newC.planType===k?"#16a34a":"#e5e7eb"}`,borderRadius:"10px",background:newC.planType===k?"#f0fdf4":"#fff",color:newC.planType===k?"#15803d":"#374151",fontWeight:newC.planType===k?"700":"400",fontSize:"12px",cursor:"pointer"}}>{l}</button>)}</div></F>
              <TI label="Start Date" type="date" value={newC.startDate} onChange={e=>setNewC({...newC,startDate:e.target.value})}/>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>setAddingClient(false)} style={{flex:1,background:"#f3f4f6",border:"none",borderRadius:"12px",padding:"12px",color:"#6b7280",cursor:"pointer",fontSize:"14px"}}>{t.cancel}</button>
                <button onClick={()=>{if(newC.name&&newC.phone){const u=[{...newC,id:Date.now(),code:genCode(),completedDays:[],status:"active"},...clients];setClients(u);setAddingClient(false);setNewC({name:"",phone:"",goal:"weightloss",planType:"monthly",amount:"1499",startDate:new Date().toISOString().split("T")[0]});}}} disabled={!newC.name||!newC.phone} style={{flex:2,background:newC.name&&newC.phone?"#15803d":"#d1d5db",border:"none",borderRadius:"12px",padding:"12px",color:"#fff",fontWeight:"700",cursor:"pointer",fontSize:"14px"}}>{t.addBtn}</button>
              </div>
            </div>}
            <h3 style={{margin:"0 0 12px",fontSize:"15px",color:"#374151"}}>{t.allClients} ({clients.length})</h3>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {clients.map(c=>{const d=Math.min(daysSince(c.startDate),30);return(
                <div key={c.id} style={{background:"#fff",borderRadius:"14px",padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                    <div><div style={{fontWeight:"700",fontSize:"15px",color:"#374151"}}>{c.name}</div><div style={{fontSize:"12px",color:"#6b7280"}}>📱 {c.phone} • {GK[c.goal]||c.goal}</div><div style={{fontSize:"11px",color:"#9ca3af",marginTop:"2px"}}>🔑 {c.code}</div></div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:"14px",fontWeight:"700",color:"#15803d"}}>₹{parseFloat(c.amount).toLocaleString()}</div><div style={{fontSize:"11px",color:c.planType==="monthly"?"#3b82f6":"#f97316",fontWeight:"600"}}>{c.planType==="monthly"?t.monthly:"Per Plan"}</div></div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}><span style={{fontSize:"12px",color:"#6b7280"}}>Day {d}/30</span><span style={{fontSize:"11px",background:c.status==="active"?"#f0fdf4":"#f3f4f6",color:c.status==="active"?"#15803d":"#6b7280",padding:"2px 10px",borderRadius:"50px",fontWeight:"600"}}>{c.status==="active"?t.activeL:t.doneL}</span></div>
                  <div style={{background:"#f3f4f6",borderRadius:"6px",height:"6px",overflow:"hidden",marginBottom:"10px"}}><div style={{background:"#16a34a",height:"100%",width:`${Math.round(d/30*100)}%`,borderRadius:"6px"}}/></div>
                  <a href={waLink("91"+c.phone,`Hello ${c.name}! DevFit follow-up. Day ${d}/30 - how are you doing? - ${profile.name} ${profile.whatsapp||"9823438787"}`)} style={{display:"block",background:"#f0fdf4",color:"#15803d",fontWeight:"600",fontSize:"13px",padding:"8px 12px",borderRadius:"10px",textDecoration:"none",textAlign:"center"}}>{t.followup}</a>
                </div>
              );})}
            </div>
          </div>}

          {adminTab==="profile"&&<div>
            <div style={{background:"#fff",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:"12px"}}>
              <h3 style={{margin:"0 0 16px",fontSize:"15px",color:"#374151"}}>👤 {t.profileTitle}</h3>
              <TI label="नाव / Name" type="text" value={profileEdit.name} onChange={e=>setProfileEdit({...profileEdit,name:e.target.value})}/>
              <TI label="Title (उदा. Certified Fitness Coach)" type="text" value={profileEdit.title} onChange={e=>setProfileEdit({...profileEdit,title:e.target.value})}/>
              <TI label="शहर / Location" type="text" value={profileEdit.location} onChange={e=>setProfileEdit({...profileEdit,location:e.target.value})}/>
              <TI label="अनुभव / Experience" type="text" value={profileEdit.experience} onChange={e=>setProfileEdit({...profileEdit,experience:e.target.value})}/>
              <TI label="Specialization (comma separated)" type="text" value={profileEdit.specialization} onChange={e=>setProfileEdit({...profileEdit,specialization:e.target.value})}/>
              <TI label="Certifications / Qualifications" type="text" value={profileEdit.certifications} onChange={e=>setProfileEdit({...profileEdit,certifications:e.target.value})}/>
              <TI label="WhatsApp Number" type="tel" value={profileEdit.whatsapp} onChange={e=>setProfileEdit({...profileEdit,whatsapp:e.target.value})}/>
              <TI label="Tagline (घोषवाक्य)" type="text" value={profileEdit.tagline} onChange={e=>setProfileEdit({...profileEdit,tagline:e.target.value})}/>
              <TA label="About (स्वतःबद्दल थोडक्यात)" value={profileEdit.about} onChange={e=>setProfileEdit({...profileEdit,about:e.target.value})}/>
              <button onClick={()=>{setProfile({...profileEdit});lsSet("dfc_profile",profileEdit);alert(lang==="mr"?"Profile Save झाली! ✅":"Profile saved! ✅");}} style={{width:"100%",background:"#15803d",border:"none",borderRadius:"12px",padding:"14px",color:"#fff",fontWeight:"700",fontSize:"15px",cursor:"pointer"}}>✅ {t.profileSave}</button>
            </div>
            <div style={{background:"linear-gradient(135deg,#14532d,#15803d)",borderRadius:"16px",padding:"20px",color:"#fff",textAlign:"center"}}>
              <div style={{fontSize:"13px",color:"#86efac",marginBottom:"10px",fontWeight:"600"}}>Preview — Home वर असे दिसेल</div>
              <div style={{fontSize:"30px",marginBottom:"8px"}}>💪</div>
              <div style={{fontSize:"18px",fontWeight:"800"}}>{profileEdit.name}</div>
              <div style={{fontSize:"13px",color:"#86efac",fontWeight:"600",marginTop:"2px"}}>{profileEdit.title}</div>
              <div style={{fontSize:"12px",color:"#d1fae5",marginTop:"2px"}}>📍 {profileEdit.location}</div>
              {profileEdit.tagline&&<div style={{background:"rgba(255,255,255,0.12)",borderRadius:"10px",padding:"8px 14px",marginTop:"10px",fontSize:"13px",fontStyle:"italic"}}>"{profileEdit.tagline}"</div>}
            </div>
          </div>}

          {adminTab==="settings"&&<div>
            <div style={{background:"#fff",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
              <h3 style={{margin:"0 0 6px",fontSize:"15px",color:"#374151"}}>{t.apiKeyTitle}</h3>
              <p style={{fontSize:"13px",color:"#6b7280",marginBottom:"14px"}}>{t.apiKeyNote}</p>
              {apiKey&&<div style={{background:"#f0fdf4",border:"1px solid #d1fae5",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",fontSize:"13px",color:"#15803d"}}>✅ API Key set आहे ({apiKey.slice(0,14)}...)</div>}
              <F label={lang==="mr"?"नवीन API Key टाका":"Enter API Key"}>
                <input type="password" placeholder={t.apiKeyPH} value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} style={{width:"100%",border:"2px solid #e5e7eb",borderRadius:"12px",padding:"12px 14px",fontSize:"14px",outline:"none",boxSizing:"border-box"}}/>
              </F>
              <button onClick={saveApiKey} style={{width:"100%",background:"#1e40af",border:"none",borderRadius:"12px",padding:"14px",color:"#fff",fontWeight:"700",fontSize:"15px",cursor:"pointer"}}>{apiKeySaved?t.apiKeySaved:t.apiKeySave}</button>
              <div style={{background:"#fef3c7",borderRadius:"10px",padding:"14px",marginTop:"14px",fontSize:"13px",color:"#92400e",lineHeight:"1.7"}}>
                <strong>📋 API Key कुठून मिळेल:</strong><br/>
                1. <strong>console.anthropic.com</strong> वर जा<br/>
                2. Login → <strong>API Keys → Create Key</strong><br/>
                3. <strong>sk-ant-...</strong> ने सुरू होणारी key copy करा<br/>
                4. वरील box मध्ये paste करा → <strong>Save Key</strong> click करा<br/><br/>
                ✅ Key एकदा save झाली की app नेहमी काम करेल.
              </div>
            </div>
          </div>}
        </div>
      </div>
    );
  }
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
