<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevFit Coach – Devidas Patil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="theme-color" content="#10b981">
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-slate-800 rounded-2xl p-6 shadow-2xl">
    <h1 class="text-3xl font-bold text-emerald-400 text-center mb-2">DevFit Coach</h1>
    <p class="text-gray-400 text-center mb-6">Devidas Patil – Advanced Fitness Tracking</p>
    
    <div class="bg-slate-700 p-4 rounded-lg mb-4">
      <h2 class="text-xl font-semibold mb-4 text-white">🏋️ Welcome to DevFit</h2>
      <p class="text-gray-300 mb-4">Your personal fitness coaching app is ready!</p>
      
      <div class="space-y-3">
        <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-lg transition">
          📊 View Dashboard
        </button>
        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition">
          💪 Workout Plans
        </button>
        <button class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-4 rounded-lg transition">
          🥗 Diet Plans
        </button>
      </div>
    </div>
    
    <p class="text-xs text-gray-500 text-center">Version 1.0 – Demo Mode</p>
  </div>
</body>
</html>
