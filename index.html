function calcBMI(h,w){if(!h||!w)return null;return(parseFloat(w)/Math.pow(parseFloat(h)/100,2)).toFixed(1);}
function bmiInfo(b){const n=parseFloat(b);if(n<18.5)return{label:"Underweight",color:"#f59e0b"};if(n<25)return{label:"Normal ✅",color:"#16a34a"};if(n<30)return{label:"Overweight",color:"#f97316"};return{label:"Obese",color:"#ef4444"};}
function daysSince(d){return Math.max(1,Math.floor((new Date()-new Date(d))/86400000)+1);}
function getPhase(day,lang){
  if(lang==="mr"){if(day<=7)return"पाया";if(day<=14)return"वाढ";if(day<=21)return"तीव्रता";if(day<=28)return"शिखर";return"आढावा";}
  if(day<=7)return"Foundation";if(day<=14)return"Building";if(day<=21)return"Intensity";if(day<=28)return"Peak";return"Assessment";
}

// ── Gemini API call ──────────────────────────────────────────
async function callGemini(apiKey, prompt){
  // Models to try in order - gemini-1.5-flash is most stable for free tier
  const models=["gemini-1.5-flash","gemini-2.0-flash","gemini-1.5-pro"];
  const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));
  
  for(let attempt=0; attempt<3; attempt++){
    for(let model of models){
      try{
        const url="https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+apiKey;
        const res=await fetch(url,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            contents:[{parts:[{text:prompt}]}],
            generationConfig:{temperature:0.7,maxOutputTokens:3000}
          })
        });
        if(!res.ok){
          const e=await res.json();
          const msg=e.error?.message||"HTTP "+res.status;
          // Rate limit - wait and retry
          if(res.status===429||msg.includes("quota")||msg.includes("Quota")||msg.includes("rate")){
            if(attempt<2){await sleep(12000);break;} // wait 12 sec then retry
            throw new Error("RATE_LIMIT");
          }
          if(res.status===404||msg.includes("not found"))continue; // try next model
          throw new Error(msg);
        }
        const data=await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      }catch(e){
        if(e.message==="RATE_LIMIT")throw e;
        if(e.message&&(e.message.includes("not found")||e.message.includes("404")))continue;
        throw e;
      }
    }
  }
  throw new Error("RATE_LIMIT");
}

function generatePDF(plan, form, profile, lang){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
  const W = doc.internal.pageSize.getWidth();
  const margin = 14;
  let y = 0;

  // Helper to add new page if needed
  function checkPage(needed=20){if(y+needed>270){doc.addPage();y=20;}}

  // ── HEADER ──
  doc.setFillColor(21,128,61); // green
  doc.rect(0,0,W,32,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(18); doc.setFont("helvetica","bold");
  doc.text("DevFit Coach", margin, 13);
  doc.setFontSize(9); doc.setFont("helvetica","normal");
  doc.text(profile.name+" | "+profile.title+" | "+profile.location, margin, 20);
  doc.text("📱 "+profile.whatsapp, margin, 26);
  doc.setFontSize(11); doc.setFont("helvetica","bold");
  doc.text(plan.programName||"30-Day Health Program", W-margin, 18, {align:"right"});
  y = 40;

  // ── CLIENT INFO BOX ──
  doc.setFillColor(240,253,244);
  doc.roundedRect(margin,y,W-margin*2,28,3,3,"F");
  doc.setDrawColor(21,128,61);
  doc.roundedRect(margin,y,W-margin*2,28,3,3,"S");
  doc.setTextColor(21,128,61); doc.setFontSize(10); doc.setFont("helvetica","bold");
  doc.text("CLIENT PROFILE", margin+4, y+7);
  doc.setTextColor(55,65,81); doc.setFont("helvetica","normal"); doc.setFontSize(9);
  const clientLines = [
    "Name: "+form.name+"   |   Age: "+form.age+" yrs   |   Gender: "+form.gender,
    "Height: "+form.height+"cm   |   Weight: "+form.weight+"kg   |   BMI: "+plan.bmi+" ("+plan.bmiCategory+")",
    "Goal: "+(plan.programName||"—")+"   |   Calories: "+(plan.calorieTarget||"—"),
  ];
  clientLines.forEach((line,i)=>{doc.text(line, margin+4, y+14+i*5.5);});
  y += 35;

  // ── SUMMARY ──
  if(plan.summary){
    doc.setFillColor(254,243,199);
    doc.roundedRect(margin,y,W-margin*2,14,3,3,"F");
    doc.setTextColor(146,64,14); doc.setFontSize(8); doc.setFont("helvetica","italic");
    const sumLines = doc.splitTextToSize("💡 "+plan.summary, W-margin*2-8);
    doc.text(sumLines, margin+4, y+6);
    y += 18;
  }

  // ── DIET TABLE ──
  checkPage(40);
  doc.setTextColor(255,255,255); doc.setFillColor(21,128,61);
  doc.rect(margin,y,W-margin*2,8,"F");
  doc.setFontSize(11); doc.setFont("helvetica","bold");
  doc.text("🥗 DIET PLAN / आहार योजना", margin+4, y+5.5);
  y += 10;

  const dietRows = (plan.dietTable||[]).map(r=>[r.time, r.meal, r.food, r.quantity, r.calories]);
  doc.autoTable({
    startY: y,
    head: [["Time/वेळ","Meal/जेवण","Food/आहार","Quantity/प्रमाण","Calories"]],
    body: dietRows,
    margin:{left:margin,right:margin},
    styles:{fontSize:8,cellPadding:2.5,lineColor:[209,250,229],lineWidth:0.3},
    headStyles:{fillColor:[21,128,61],textColor:255,fontStyle:"bold",fontSize:8},
    alternateRowStyles:{fillColor:[249,250,251]},
    columnStyles:{0:{cellWidth:18},1:{cellWidth:22},2:{cellWidth:80},3:{cellWidth:22},4:{cellWidth:18}},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 8;

  // ── DO / DON'T LISTS side by side ──
  checkPage(30);
  const colW = (W-margin*2-4)/2;
  // DO
  doc.setFillColor(21,128,61);
  doc.rect(margin,y,colW,7,"F");
  doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont("helvetica","bold");
  doc.text("✅ DO - हे नक्की करा", margin+3, y+5);
  y += 8;
  doc.setTextColor(55,65,81); doc.setFont("helvetica","normal"); doc.setFontSize(8);
  (plan.doList||[]).forEach((item,i)=>{
    checkPage(6);
    doc.text("• "+item, margin+2, y);
    y+=5;
  });
  // DON'T - reset y to right column
  let rightY = y - (plan.doList||[]).length*5 - 8;
  doc.setFillColor(239,68,68);
  doc.rect(margin+colW+4,rightY,colW,7,"F");
  doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont("helvetica","bold");
  doc.text("❌ DON'T - हे टाळा", margin+colW+7, rightY+5);
  rightY += 8;
  doc.setTextColor(55,65,81); doc.setFont("helvetica","normal"); doc.setFontSize(8);
  (plan.dontList||[]).forEach((item,i)=>{
    doc.text("• "+item, margin+colW+6, rightY);
    rightY+=5;
  });
  y = Math.max(y, rightY) + 4;

  // ── WORKOUT TABLE ──
  checkPage(40);
  doc.setTextColor(255,255,255); doc.setFillColor(30,64,175);
  doc.rect(margin,y,W-margin*2,8,"F");
  doc.setFontSize(11); doc.setFont("helvetica","bold");
  doc.text("🏋️ WORKOUT PLAN / व्यायाम वेळापत्रक", margin+4, y+5.5);
  y += 10;

  const workoutRows = (plan.workoutTable||[]).map(r=>[r.day,r.focus,r.exercise,r.sets,r.reps,r.rest]);
  doc.autoTable({
    startY: y,
    head: [["Day","Focus","Exercise","Sets","Reps","Rest"]],
    body: workoutRows,
    margin:{left:margin,right:margin},
    styles:{fontSize:8,cellPadding:2.5,lineColor:[219,234,254],lineWidth:0.3},
    headStyles:{fillColor:[30,64,175],textColor:255,fontStyle:"bold",fontSize:8},
    alternateRowStyles:{fillColor:[249,250,251]},
    columnStyles:{0:{cellWidth:20},1:{cellWidth:30},2:{cellWidth:68},3:{cellWidth:12},4:{cellWidth:16},5:{cellWidth:16}},
    theme:"grid",
    didParseCell: (data)=>{
      if(data.section==="body" && data.column.index===0 && data.cell.raw){
        data.cell.styles.fontStyle="bold";
        data.cell.styles.textColor=[30,64,175];
      }
    }
  });
  y = doc.lastAutoTable.finalY + 8;

  // ── MOTIVATIONAL NOTE ──
  if(plan.motivationalNote){
    checkPage(20);

  }

  // ── FOOTER every page ──
  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFillColor(240,253,244);
    doc.rect(0,284,W,13,"F");

  // ── SAVE ──
  const filename = "DevFit_"+form.name.replace(/\s+/g,"_")+"_HealthPlan.pdf";

  }

  // ── ADMIN ──
  if(screen==="admin"){
    if(!adminAuth)return(
      <div style={{minHeight:"100vh",background:"#1f2937",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 20px"}}>
        <div style={{fontSize:"48px",marginBottom:"12px"}}>🔐</div>
        <h2 style={{color:"#fff",margin:"0 0 4px"}}>{t.aLogin}</h2>
        <p style={{color:"#9ca3af",fontSize:"14px",marginBottom:"24px"}}>{t.aOnly}</p>
        <input type="password" placeholder={t.ePas} value={adminInput} onChange={e=>setAdminInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(adminInput===ADMIN_PASS?(setAdminAuth(true),setAdminErr("")):(setAdminErr(t.wPas)))} style={{width:"100%",maxWidth:"300px",border:"2px solid #374151",borderRadius:"12px",padding:"14px",fontSize:"16px",background:"#374151",color:"#fff",outline:"none",boxSizing:"border-box",marginBottom:"10px"}}/>
        {adminErr&&<p style={{color:"#f87171",fontSize:"13px",marginBottom:"8px"}}>{adminErr}</p>}
        <div style={{display:"flex",gap:"10px",width:"100%",maxWidth:"300px"}}>
          <button onClick={()=>setScreen("home")} style={{flex:1,background:"#374151",border:"none",borderRadius:"12px",padding:"14px",color:"#9ca3af",cursor:"pointer",fontSize:"14px"}}>{t.back}</button>
          <button onClick={()=>adminInput===ADMIN_PASS?(setAdminAuth(true),setAdminErr("")):(setAdminErr(t.wPas))} style={{flex:2,background:"#16a34a",border:"none",borderRadius:"12px",padding:"14px",color:"#fff",fontWeight:"700",cursor:"pointer",fontSize:"14px"}}>{t.lBtn}</button>
        </div>
      </div>
    );
    const totalRev=clients.reduce((s,c)=>s+parseFloat(c.amount||0),0);
    const active=clients.filter(c=>c.status==="active").length;
    return(
      <div style={{background:"#f8fafc",minHeight:"100vh",paddingBottom:"40px"}}>
        <div style={{background:"linear-gradient(135deg,#1f2937,#374151)",padding:"20px 16px",color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><h2 style={{margin:0,fontSize:"18px",fontWeight:"700"}}>{t.aTitle}</h2><p style={{margin:0,fontSize:"12px",color:"#9ca3af"}}>DevFit Coach</p></div>
            <div style={{display:"flex",gap:"8px"}}><LT/><button onClick={()=>setScreen("home")} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#9ca3af",padding:"8px 12px",borderRadius:"8px",cursor:"pointer",fontSize:"12px"}}>{t.home}</button></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"16px"}}>
            {[["₹"+totalRev.toLocaleString(),t.tRev],[active,t.aC],[clients.length,t.tot]].map(([v,l])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.1)",borderRadius:"12px",padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:"16px",fontWeight:"700"}}>{v}</div><div style={{fontSize:"10px",color:"#9ca3af",marginTop:"2px"}}>{l}</div></div>
            ))}
          </div>
        </div>
        <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #e5e7eb"}}>
          {[["clients",t.cTab],["profile",t.pTab],["settings",t.sTab]].map(([k,lb])=>(
            <button key={k} onClick={()=>setAdminTab(k)} style={{flex:1,padding:"12px 4px",border:"none",background:"none",fontSize:"12px",fontWeight:adminTab===k?"700":"500",color:adminTab===k?"#15803d":"#6b7280",borderBottom:`2px solid ${adminTab===k?"#15803d":"transparent"}`,cursor:"pointer",marginBottom:"-2px"}}>{lb}</button>
          ))}
        </div>
        <div style={{padding:"16px"}}>
          {adminTab==="clients"&&<div>
            {!addingClient?<button onClick={()=>setAddingClient(true)} style={{width:"100%",background:"#15803d",border:"none",borderRadius:"14px",padding:"14px",color:"#fff",fontWeight:"700",fontSize:"15px",cursor:"pointer",marginBottom:"16px"}}>{t.addC}</button>
            :<div style={{background:"#fff",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:"16px"}}>
              <TI label="नाव / Name" type="text" placeholder="Client Name" value={newC.name} onChange={e=>setNewC({...newC,name:e.target.value})}/>
              <TI label="Phone" type="tel" placeholder="9876543210" value={newC.phone} onChange={e=>setNewC({...newC,phone:e.target.value})}/>
              <F label={t.pType}><div style={{display:"flex",gap:"8px"}}>{[["perplan","Per Plan (₹699)"],["monthly","Monthly (₹1,499)"]].map(([k,l])=><button key={k} onClick={()=>setNewC({...newC,planType:k,amount:k==="monthly"?"1499":"699"})} style={{flex:1,padding:"10px 4px",border:`2px solid ${newC.planType===k?"#16a34a":"#e5e7eb"}`,borderRadius:"10px",background:newC.planType===k?"#f0fdf4":"#fff",color:newC.planType===k?"#15803d":"#374151",fontWeight:newC.planType===k?"700":"400",fontSize:"12px",cursor:"pointer"}}>{l}</button>)}</div></F>
              <TI label="Start Date" type="date" value={newC.startDate} onChange={e=>setNewC({...newC,startDate:e.target.value})}/>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>setAddingClient(false)} style={{flex:1,background:"#f3f4f6",border:"none",borderRadius:"12px",padding:"12px",color:"#6b7280",cursor:"pointer",fontSize:"14px"}}>{t.cancel}</button>
                <button onClick={()=>{if(newC.name&&newC.phone){setClients([{...newC,id:Date.now(),code:genCode(),completedDays:[],status:"active"},...clients]);setAddingClient(false);setNewC({name:"",phone:"",goal:"weightloss",planType:"monthly",amount:"1499",startDate:new Date().toISOString().split("T")[0]});}}} disabled={!newC.name||!newC.phone} style={{flex:2,background:newC.name&&newC.phone?"#15803d":"#d1d5db",border:"none",borderRadius:"12px",padding:"12px",color:"#fff",fontWeight:"700",cursor:"pointer",fontSize:"14px"}}>{t.addB}</button>
              </div>
            </div>}
            <h3 style={{margin:"0 0 12px",fontSize:"15px",color:"#374151"}}>{t.allC} ({clients.length})</h3>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {clients.map(c=>{const d=Math.min(daysSince(c.startDate),30);return(
                <div key={c.id} style={{background:"#fff",borderRadius:"14px",padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                    <div><div style={{fontWeight:"700",fontSize:"15px",color:"#374151"}}>{c.name}</div><div style={{fontSize:"12px",color:"#6b7280"}}>📱 {c.phone} • {GK[c.goal]||c.goal}</div><div style={{fontSize:"11px",color:"#9ca3af",marginTop:"2px"}}>🔑 {c.code}</div></div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:"14px",fontWeight:"700",color:"#15803d"}}>₹{parseFloat(c.amount).toLocaleString()}</div><div style={{fontSize:"11px",color:c.planType==="monthly"?"#3b82f6":"#f97316",fontWeight:"600"}}>{c.planType==="monthly"?t.monthly:"Per Plan"}</div></div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}><span style={{fontSize:"12px",color:"#6b7280"}}>Day {d}/30</span><span style={{fontSize:"11px",background:c.status==="active"?"#f0fdf4":"#f3f4f6",color:c.status==="active"?"#15803d":"#6b7280",padding:"2px 10px",borderRadius:"50px",fontWeight:"600"}}>{c.status==="active"?t.actL:t.doneL}</span></div>
                  <div style={{background:"#f3f4f6",borderRadius:"6px",height:"6px",overflow:"hidden",marginBottom:"10px"}}><div style={{background:"#16a34a",height:"100%",width:`${Math.round(d/30*100)}%`,borderRadius:"6px"}}/></div>
                  <a href={waLink("91"+c.phone,`Hello ${c.name}! DevFit follow-up. Day ${d}/30 - how going? - ${profile.name} ${profile.whatsapp}`)} style={{display:"block",background:"#f0fdf4",color:"#15803d",fontWeight:"600",fontSize:"13px",padding:"8px 12px",borderRadius:"10px",textDecoration:"none",textAlign:"center"}}>{t.fu}</a>
                </div>
              );})}
            </div>
          </div>}

          {adminTab==="profile"&&<div>
            <div style={{background:"#fff",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:"12px"}}>
              <h3 style={{margin:"0 0 16px",fontSize:"15px",color:"#374151"}}>👤 {t.profTitle}</h3>
              <TI label="नाव / Name" type="text" value={profileEdit.name} onChange={e=>setProfileEdit({...profileEdit,name:e.target.value})}/>
              <TI label="Title" type="text" value={profileEdit.title} onChange={e=>setProfileEdit({...profileEdit,title:e.target.value})}/>
              <TI label="Location" type="text" value={profileEdit.location} onChange={e=>setProfileEdit({...profileEdit,location:e.target.value})}/>
              <TI label="Experience" type="text" value={profileEdit.experience} onChange={e=>setProfileEdit({...profileEdit,experience:e.target.value})}/>
              <TI label="Specialization" type="text" value={profileEdit.specialization} onChange={e=>setProfileEdit({...profileEdit,specialization:e.target.value})}/>
              <TI label="WhatsApp Number" type="tel" value={profileEdit.whatsapp} onChange={e=>setProfileEdit({...profileEdit,whatsapp:e.target.value})}/>
              <TI label="Tagline / घोषवाक्य" type="text" value={profileEdit.tagline} onChange={e=>setProfileEdit({...profileEdit,tagline:e.target.value})}/>
              <TA label="About yourself" value={profileEdit.about} onChange={e=>setProfileEdit({...profileEdit,about:e.target.value})}/>
              <button onClick={()=>{setProfile({...profileEdit});lsSet("dfc_profile",profileEdit);alert("✅ Profile Saved!");}} style={{width:"100%",background:"#15803d",border:"none",borderRadius:"12px",padding:"14px",color:"#fff",fontWeight:"700",fontSize:"15px",cursor:"pointer"}}>✅ {t.profSave}</button>
            </div>
            <div style={{background:"linear-gradient(135deg,#14532d,#15803d)",borderRadius:"16px",padding:"20px",color:"#fff",textAlign:"center"}}>
              <div style={{fontSize:"13px",color:"#86efac",marginBottom:"10px",fontWeight:"600"}}>Preview</div>
              <div style={{fontSize:"30px",marginBottom:"8px"}}>💪</div>
              <div style={{fontSize:"18px",fontWeight:"800"}}>{profileEdit.name}</div>
              <div style={{fontSize:"13px",color:"#86efac",fontWeight:"600",marginTop:"2px"}}>{profileEdit.title}</div>
              <div style={{fontSize:"12px",color:"#d1fae5",marginTop:"2px"}}>📍 {profileEdit.location}</div>
              {profileEdit.tagline&&<div style={{background:"rgba(255,255,255,0.12)",borderRadius:"10px",padding:"8px 14px",marginTop:"10px",fontSize:"13px",fontStyle:"italic"}}>"{profileEdit.tagline}"</div>}
            </div>
          </div>}

          {adminTab==="settings"&&<div>
            <div style={{background:"#fff",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
              <h3 style={{margin:"0 0 4px",fontSize:"15px",color:"#374151"}}>{t.akTitle}</h3>
              <p style={{fontSize:"13px",color:"#6b7280",marginBottom:"14px"}}>{t.akNote}</p>
              {apiKey&&<div style={{background:"#f0fdf4",border:"1px solid #d1fae5",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",fontSize:"13px",color:"#15803d"}}>✅ Gemini API Key set आहे ({apiKey.slice(0,10)}...)</div>}
              <F label={lang==="mr"?"नवीन Key टाका":"Paste your Gemini Key here"}>
                <input type="password" placeholder={t.akPH} value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} style={{width:"100%",border:"2px solid #e5e7eb",borderRadius:"12px",padding:"12px 14px",fontSize:"14px",outline:"none",boxSizing:"border-box"}}/>
              </F>
              <button onClick={saveKey} style={{width:"100%",background:"#1e40af",border:"none",borderRadius:"12px",padding:"14px",color:"#fff",fontWeight:"700",fontSize:"15px",cursor:"pointer"}}>{apiKeySaved?t.akSaved:t.akSave}</button>

              {/* Step by step guide */}
              <div style={{background:"#f0fdf4",border:"1px solid #d1fae5",borderRadius:"12px",padding:"14px",marginTop:"16px"}}>
                <div style={{fontWeight:"700",color:"#15803d",marginBottom:"10px",fontSize:"14px"}}>✅ मोफत Gemini API Key कशी मिळवायची:</div>
                {[
                  ["1","Chrome मध्ये उघडा: aistudio.google.com"],
                  ["2","तुमच्या Gmail ने Login करा"],
                  ["3",'"Get API Key" → "Create API Key" click करा'],
                  ["4",'"AIza..." ने सुरू होणारी key Copy करा'],
                  ["5","वरील box मध्ये Paste करा → Save Key click करा"],
                  ["6","✅ App काम करायला सुरुवात होईल!"]
                ].map(([n,s])=>(
                  <div key={n} style={{display:"flex",gap:"10px",alignItems:"flex-start",marginBottom:"8px"}}>
                    <div style={{width:"22px",height:"22px",borderRadius:"50%",background:"#16a34a",color:"#fff",fontSize:"12px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div>
                    <span style={{fontSize:"13px",color:"#374151",lineHeight:"1.5"}}>{s}</span>
                  </div>
                ))}
              </div>

              <div style={{background:"#eff6ff",borderRadius:"12px",padding:"12px 14px",marginTop:"12px",fontSize:"13px",color:"#1e40af",lineHeight:"1.6"}}>
                🎁 <strong>मोफत:</strong> रोज १५०० requests, Credit Card नाही, Sign Up मोफत.<br/>
                तुमच्या वापरासाठी हे कायम पुरेसे आहे!
              </div>
            </div>
          </div>}
        </div>
      </div>
    );
  }
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
