<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DevFit Coach – Devidas Patil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="theme-color" content="#10b981">
  <link rel="manifest" href='data:application/json;base64,eyJuYW1lIjoiRGV2Rml0IENvYWNoIiwic2hvcnRfbmFtZSI6IkRldkZpdCIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGYxNzJhIiwidGhlbWVfY29sb3IiOiIjMTBiZjgxIn0='>
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    .screen { display: none; }
    .screen.active { display: block; }
    .btn-active { transform: scale(0.98); }
  </style>
</head>
<body class="min-h-screen p-4">

  <!-- HOME SCREEN -->
  <div id="home-screen" class="screen active max-w-md mx-auto">
    <div class="bg-slate-800 rounded-2xl p-6 shadow-2xl mt-10">
      <h1 class="text-3xl font-bold text-emerald-400 text-center mb-2">DevFit Coach</h1>
      <p class="text-gray-400 text-center mb-6">Devidas Patil – Advanced Fitness Tracking</p>
      
      <div class="bg-slate-700 p-4 rounded-lg mb-4">
        <h2 class="text-xl font-semibold mb-4 text-white">🏋️ Welcome to DevFit</h2>
        <p class="text-gray-300 mb-4">Your personal fitness coaching app is ready!</p>
        
        <div class="space-y-3">
          <button onclick="showScreen('login-screen')" class="btn-active w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-lg transition">
            📊 View Dashboard
          </button>
          <button onclick="showScreen('login-screen')" class="btn-active w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition">
            💪 Workout Plans
          </button>
          <button onclick="showScreen('login-screen')" class="btn-active w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-4 rounded-lg transition">
            🥗 Diet Plans
          </button>
        </div>
      </div>
      <p class="text-xs text-gray-500 text-center">Version 1.0 – Demo Mode</p>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="screen max-w-md mx-auto">
    <div class="bg-slate-800 rounded-2xl p-6 shadow-2xl mt-10">
      <h2 class="text-2xl font-bold text-emerald-400 text-center mb-6">🔐 Login</h2>
      
      <input type="email" id="login-email" placeholder="Email" class="w-full p-3 rounded-lg bg-slate-700 mb-3 text-white border border-slate-600">      <input type="password" id="login-password" placeholder="Password" class="w-full p-3 rounded-lg bg-slate-700 mb-3 text-white border border-slate-600">
      
      <select id="login-role" class="w-full p-3 rounded-lg bg-slate-700 mb-4 text-white border border-slate-600">
        <option value="client">I am a Client</option>
        <option value="coach">I am a Coach</option>
      </select>
      
      <div class="flex gap-3">
        <button onclick="handleLogin()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-lg font-semibold">Login</button>
        <button onclick="handleSignup()" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-semibold">Sign Up</button>
      </div>
      
      <button onclick="showScreen('home-screen')" class="w-full mt-3 text-gray-400 text-sm">← Back to Home</button>
      <p id="login-msg" class="text-sm text-center mt-3 h-5"></p>
    </div>
  </div>

  <!-- CLIENT DASHBOARD -->
  <div id="client-screen" class="screen max-w-md mx-auto">
    <div class="bg-slate-800 rounded-2xl p-6 shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-emerald-400">💪 My Workout</h2>
        <button onclick="logout()" class="text-red-400 text-sm">Logout</button>
      </div>

      <!-- Add Workout Form -->
      <div class="bg-slate-700 p-4 rounded-lg mb-4">
        <h3 class="font-semibold mb-3">📝 Log Workout</h3>
        <input type="text" id="exercise" placeholder="Exercise (e.g., Push-ups)" class="w-full p-2 rounded bg-slate-600 mb-2 text-white">
        <div class="flex gap-2 mb-2">
          <input type="number" id="sets" placeholder="Sets" class="w-1/3 p-2 rounded bg-slate-600 text-white">
          <input type="number" id="reps" placeholder="Reps" class="w-1/3 p-2 rounded bg-slate-600 text-white">
          <input type="number" id="rpe" placeholder="RPE 1-10" class="w-1/3 p-2 rounded bg-slate-600 text-white">
        </div>
        <button onclick="addWorkout()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-2 rounded font-semibold">💾 Save</button>
      </div>

      <!-- Workout History -->
      <div>
        <h3 class="font-semibold mb-2">📊 Recent Workouts</h3>
        <div id="workout-list" class="space-y-2 max-h-64 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <!-- COACH DASHBOARD -->
  <div id="coach-screen" class="screen max-w-md mx-auto">
    <div class="bg-slate-800 rounded-2xl p-6 shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-blue-400">👨‍ Coach Panel</h2>        <button onclick="logout()" class="text-red-400 text-sm">Logout</button>
      </div>

      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="bg-slate-700 p-4 rounded-lg text-center">
          <div class="text-2xl font-bold text-emerald-400" id="total-clients">0</div>
          <div class="text-xs text-gray-400">Active Clients</div>
        </div>
        <div class="bg-slate-700 p-4 rounded-lg text-center">
          <div class="text-2xl font-bold text-blue-400" id="total-workouts">0</div>
          <div class="text-xs text-gray-400">Workouts Logged</div>
        </div>
      </div>

      <div class="bg-slate-700 p-4 rounded-lg">
        <h3 class="font-semibold mb-3">📈 All Client Activity</h3>
        <div id="coach-activity" class="space-y-2 max-h-64 overflow-y-auto">
          <p class="text-gray-400 text-sm text-center py-4">No activity yet</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State Management
    let currentUser = JSON.parse(localStorage.getItem('devfit_user') || 'null');
    let workouts = JSON.parse(localStorage.getItem('devfit_workouts') || '[]');
    let users = JSON.parse(localStorage.getItem('devfit_users') || '[]');

    // Initialize
    if (currentUser) {
      showScreen(currentUser.role === 'coach' ? 'coach-screen' : 'client-screen');
      if (currentUser.role === 'client') renderWorkouts();
      if (currentUser.role === 'coach') renderCoachData();
    }

    // Navigation
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // Auth Functions
    function handleSignup() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const role = document.getElementById('login-role').value;

      if (!email || !password) {
        showMsg('Please fill all fields', true);        return;
      }

      if (users.find(u => u.email === email)) {
        showMsg('User already exists', true);
        return;
      }

      const newUser = { id: Date.now(), email, password, role };
      users.push(newUser);
      localStorage.setItem('devfit_users', JSON.stringify(users));
      
      showMsg('✅ Account created! Please login.', false);
      setTimeout(() => {}, 1500);
    }

    function handleLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      const user = users.find(u => u.email === email && u.password === password);
      
      if (!user) {
        showMsg('Invalid credentials', true);
        return;
      }

      currentUser = user;
      localStorage.setItem('devfit_user', JSON.stringify(user));
      
      showScreen(user.role === 'coach' ? 'coach-screen' : 'client-screen');
      if (user.role === 'client') renderWorkouts();
      if (user.role === 'coach') renderCoachData();
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('devfit_user');
      showScreen('home-screen');
    }

    function showMsg(msg, isError) {
      const el = document.getElementById('login-msg');
      el.textContent = msg;
      el.className = `text-sm text-center mt-3 h-5 ${isError ? 'text-red-400' : 'text-emerald-400'}`;
    }

    // Workout Functions
    function addWorkout() {
      const exercise = document.getElementById('exercise').value;      const sets = document.getElementById('sets').value;
      const reps = document.getElementById('reps').value;
      const rpe = document.getElementById('rpe').value;

      if (!exercise || !sets || !reps) {
        alert('Please fill exercise, sets and reps');
        return;
      }

      const workout = {
        id: Date.now(),
        userId: currentUser.id,
        exercise,
        sets,
        reps,
        rpe,
        date: new Date().toISOString()
      };

      workouts.push(workout);
      localStorage.setItem('devfit_workouts', JSON.stringify(workouts));

      // Clear inputs
      document.getElementById('exercise').value = '';
      document.getElementById('sets').value = '';
      document.getElementById('reps').value = '';
      document.getElementById('rpe').value = '';

      renderWorkouts();
    }

    function renderWorkouts() {
      const list = document.getElementById('workout-list');
      const myWorkouts = workouts.filter(w => w.userId === currentUser.id).slice().reverse();

      if (myWorkouts.length === 0) {
        list.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">No workouts logged yet</p>';
        return;
      }

      list.innerHTML = myWorkouts.map(w => `
        <div class="bg-slate-700 p-3 rounded flex justify-between items-center">
          <div>
            <div class="font-semibold">${w.exercise}</div>
            <div class="text-sm text-gray-400">${w.sets} sets × ${w.reps} reps • RPE: ${w.rpe}</div>
            <div class="text-xs text-gray-500">${new Date(w.date).toLocaleDateString()}</div>
          </div>
          <button onclick="deleteWorkout(${w.id})" class="text-red-400 text-xs px-2">✕</button>
        </div>
      `).join('');    }

    function deleteWorkout(id) {
      workouts = workouts.filter(w => w.id !== id);
      localStorage.setItem('devfit_workouts', JSON.stringify(workouts));
      renderWorkouts();
    }

    // Coach Functions
    function renderCoachData() {
      const clients = users.filter(u => u.role === 'client');
      document.getElementById('total-clients').textContent = clients.length;
      document.getElementById('total-workouts').textContent = workouts.length;

      const activityDiv = document.getElementById('coach-activity');
      
      if (workouts.length === 0) {
        activityDiv.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">No activity yet</p>';
        return;
      }

      activityDiv.innerHTML = workouts.slice().reverse().map(w => {
        const client = users.find(u => u.id === w.userId);
        return `
          <div class="bg-slate-600 p-3 rounded">
            <div class="flex justify-between items-start">
              <div>
                <div class="font-semibold text-emerald-300">${client?.email || 'Unknown'}</div>
                <div class="text-sm">${w.exercise}</div>
                <div class="text-xs text-gray-400">${w.sets}×${w.reps} • RPE ${w.rpe}</div>
              </div>
              <div class="text-xs text-gray-500">${new Date(w.date).toLocaleDateString()}</div>
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
