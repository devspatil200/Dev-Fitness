function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function calcBMI(h,w){if(!h||!w)return null;return(parseFloat(w)/Math.pow(parseFloat(h)/100,2)).toFixed(1);}
function bmiInfo(b){const n=parseFloat(b);if(n<18.5)return{label:"Underweight",color:"#f59e0b"};if(n<25)return{label:"Normal ✅",color:"#16a34a"};if(n<30)return{label:"Overweight",color:"#f97316"};return{label:"Obese",color:"#ef4444"};}
function daysSince(d){return Math.max(1,Math.floor((new Date()-new Date(d))/86400000)+1);}
function genCode(){return"DEV"+Math.floor(1000+Math.random()*9000);}
function waLink(p,msg){const ph=String(p).startsWith("91")?p:"91"+p;return"https://wa.me/"+ph+"?text="+encodeURIComponent(msg);}
function parseJSON(raw){const c=raw.replace(/```json|```/g,"").trim();const s=c.indexOf("{");const e=c.lastIndexOf("}");return JSON.parse(s>=0&&e>=0?c.substring(s,e+1):c);}

async function callGroq(apiKey,prompt){
  const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
    body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"user",content:prompt}],max_tokens:3500,temperature:0.7})
  });
  if(!res.ok){const e=await res.json();const msg=e.error?.message||"HTTP "+res.status;if(res.status===429||msg.includes("rate")||msg.includes("quota"))throw new Error("RATE_LIMIT");throw new Error(msg);}
  const d=await res.json();return d.choices?.[0]?.message?.content||"";
}

function buildDailyPrompt(client,day,profile){
  const phase=day<=10?"beginner":day<=20?"intermediate":"advanced";
  const phaseObj=PHASES[phase];
  const age=parseInt(client.age);
  const isSenior=age>=60;
  const medNotes=[];
  if((client.conditions||[]).includes("diabetes"))medNotes.push("Diabetes: low-GI foods, no fasted intense workout");
  if((client.conditions||[]).includes("bp"))medNotes.push("BP: no heavy lifting, no breath-holding");
  if((client.conditions||[]).includes("knee"))medNotes.push("Knee pain: no impact exercises");
  if((client.conditions||[]).includes("back"))medNotes.push("Back pain: core-focused, no heavy deadlifts");
  if((client.conditions||[]).includes("pcod"))medNotes.push("PCOD: strength over cardio, anti-inflammatory foods");

  return `You are ${profile.name}, expert fitness coach. Create today's specific workout and diet for Day ${day}/30.

CLIENT: ${client.name}, Age:${age}, Gender:${client.gender}, BMI:${client.plan?.bmi||"—"}
Goal: ${client.goal}, Food: ${client.foodType}
Medical: ${medNotes.length>0?medNotes.join(", "):"None"}
${isSenior?"SENIOR - low impact only, gentle exercises":""}

CURRENT PHASE: ${phaseObj.label} (${phaseObj.days}) — Intensity: ${phaseObj.intensity}
${phase==="beginner"?"BEGINNER RULES: 5 sets, reps 15-12-10-10-10. Light weight. Rest 90 sec. FORM priority."
:phase==="intermediate"
?"INTERMEDIATE RULES: 5 sets, reps 12-10-8-8-8. Moderate weight. Rest 75 sec. Compound movements."
:"ADVANCED RULES: 5 sets, reps 12-10-8-8-6. Heavy weight. Rest 60 sec. DROP SET mandatory after last set (reduce 30%, go to failure)."}

IMPORTANT: Use only Indian/Maharashtrian foods. Write in English only. ASCII text only in JSON.

Reply ONLY raw JSON:
{"day":${day},"phase":"${phaseObj.label}","phaseColor":"${phaseObj.color}","workout":{"warmup":"Specific 5-min warmup for Day ${day}","exercises":["Exercise1 - sets x reps","Exercise2 - sets x reps","Exercise3 - sets x reps","Exercise4 - sets x reps"],"cooldown":"Specific 5-min cooldown","duration":"40-50 min","tip":"One specific, practical tip for Day ${day}"},"diet":{"earlyMorning":"specific Indian food with quantity","breakfast":"specific Indian breakfast","midMorning":"specific Indian snack","lunch":"specific Indian lunch","eveningSnack":"specific Indian evening snack","dinner":"specific light Indian dinner"},"motivation":"Short, powerful, specific encouragement for Day ${day} of ${client.name}'s journey"}`;

// ── PDF GENERATOR ────────────────────────────────────────────
function generatePDF(plan,form,profile){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=doc.internal.pageSize.getWidth();const M=14;let y=0;
  function chk(n=25){if(y+n>272){doc.addPage();y=18;}}

  // Header
  doc.setFillColor(21,128,61);doc.rect(0,0,W,30,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont("helvetica","bold");
  doc.text("DevFit Coach",M,12);
  doc.setFontSize(8);doc.setFont("helvetica","normal");
  doc.text(profile.name+" | "+profile.title+" | "+profile.location,M,19);
  doc.text("WhatsApp: "+profile.whatsapp,M,24);
  doc.setFontSize(11);doc.setFont("helvetica","bold");
  doc.text(plan.programName||"30-Day Health Program",W-M,18,{align:"right"});
  y=36;

  // Client box
  doc.setFillColor(240,253,244);doc.roundedRect(M,y,W-M*2,30,3,3,"F");
  doc.setDrawColor(21,128,61);doc.roundedRect(M,y,W-M*2,30,3,3,"S");
  doc.setTextColor(21,128,61);doc.setFontSize(9);doc.setFont("helvetica","bold");
  doc.text("CLIENT PROFILE",M+4,y+8);
  doc.setTextColor(55,65,81);doc.setFont("helvetica","normal");doc.setFontSize(8.5);
  doc.text("Name: "+form.name+"   |   Age: "+form.age+" yrs   |   Gender: "+form.gender,M+4,y+15);
  doc.text("Height: "+form.height+"cm  |  Weight: "+form.weight+"kg  |  BMI: "+plan.bmi+" ("+plan.bmiCategory+")",M+4,y+21);
  doc.text("Goal: "+(GK[form.goal]||form.goal)+"   |   Daily Calories: "+(plan.calorieTarget||"—"),M+4,y+27);
  y+=36;

  // 3 Phases banner
  chk(18);
  const pW=(W-M*2)/3-2;
  [
    ["Beginner","1-6 Months","5 Sets • 15,12,10,10,10 • Light",[21,128,61]],
    ["Intermediate","7-12 Months","5 Sets • 12,10,8,8,8 • Moderate",[249,115,22]],
    ["Advanced","12+ Months","5 Sets • 12,10,8,8,6+Drop • Heavy",[220,38,38]]
  ].forEach(([label,dur,scheme,color],i)=>{
    doc.setFillColor(...color);doc.roundedRect(M+i*(pW+3),y,pW,18,2,2,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont("helvetica","bold");
    doc.text(label,M+i*(pW+3)+pW/2,y+7,{align:"center"});
    doc.setFont("helvetica","normal");doc.setFontSize(6.5);
    doc.text(dur,M+i*(pW+3)+pW/2,y+12,{align:"center"});
    doc.text(scheme,M+i*(pW+3)+pW/2,y+16,{align:"center"});
  });
  y+=24;

  // Summary
  if(plan.summary){chk(14);doc.setFillColor(254,243,199);doc.roundedRect(M,y,W-M*2,12,2,2,"F");doc.setTextColor(146,64,14);doc.setFontSize(8);doc.setFont("helvetica","italic");const sl=doc.splitTextToSize("Note: "+plan.summary,W-M*2-6);doc.text(sl,M+3,y+5);y+=16;}

  // Diet Table
  chk(50);
  doc.setFillColor(21,128,61);doc.rect(M,y,W-M*2,8,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont("helvetica","bold");
  doc.text("DIET PLAN",M+4,y+5.5);y+=10;
  const dietRows=(plan.dietTable||[]).map(r=>[r.time,r.meal,r.food,r.quantity,r.calories]);
  doc.autoTable({startY:y,head:[["Time","Meal","Food / Diet","Quantity","Calories"]],body:dietRows,
    margin:{left:M,right:M},styles:{fontSize:8,cellPadding:2.5},
    headStyles:{fillColor:[21,128,61],textColor:255,fontStyle:"bold"},
    alternateRowStyles:{fillColor:[249,250,251]},
    columnStyles:{0:{cellWidth:16},1:{cellWidth:26},2:{cellWidth:82},3:{cellWidth:22},4:{cellWidth:17}},theme:"grid"});
  y=doc.lastAutoTable.finalY+8;

  // Do / Don't
  chk(40);
  const cW=(W-M*2-4)/2;
  doc.setFillColor(21,128,61);doc.rect(M,y,cW,7,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont("helvetica","bold");
  doc.text("DO - Must Follow",M+3,y+5);y+=8;
  const doY=y;doc.setTextColor(55,65,81);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
  (plan.doList||[]).forEach(item=>{chk(6);doc.text("• "+item,M+2,y);y+=5;});
  let rY=doY;
  doc.setFillColor(220,38,38);doc.rect(M+cW+4,doY-8,cW,7,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont("helvetica","bold");
  doc.text("DON'T - Avoid",M+cW+7,doY-3);
  doc.setTextColor(55,65,81);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
  (plan.dontList||[]).forEach(item=>{doc.text("• "+item,M+cW+6,rY);rY+=5;});
  y=Math.max(y,rY)+8;

  // Workout Table — merge same-day rows
  chk(50);
  doc.setFillColor(30,64,175);doc.rect(M,y,W-M*2,8,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont("helvetica","bold");
  doc.text("WORKOUT PLAN — 30 DAYS",M+4,y+5.5);y+=10;
  const wTable=plan.workoutTable||[];
  const wRows=wTable.map((r,i)=>{const prev=i>0?wTable[i-1].day:"";const isNew=r.day!==prev;return[isNew?r.day:"",isNew?r.focus:"",r.exercise,r.sets,r.reps,r.rest];});
  doc.autoTable({startY:y,head:[["Day","Focus","Exercise","Sets","Reps","Rest"]],body:wRows,
    margin:{left:M,right:M},styles:{fontSize:7.5,cellPadding:2},
    headStyles:{fillColor:[30,64,175],textColor:255,fontStyle:"bold"},
    columnStyles:{0:{cellWidth:18},1:{cellWidth:28},2:{cellWidth:70},3:{cellWidth:11},4:{cellWidth:16},5:{cellWidth:20}},theme:"grid",
    didParseCell:(d)=>{
      if(d.section==="body"&&d.column.index===0&&d.cell.raw&&d.cell.raw.trim()){d.cell.styles.fontStyle="bold";d.cell.styles.textColor=[30,64,175];d.cell.styles.fillColor=[240,245,255];}
      if(d.section==="body"&&d.column.index===1&&d.cell.raw&&d.cell.raw.trim()){d.cell.styles.fillColor=[240,245,255];}
    }});
  y=doc.lastAutoTable.finalY+8;

  // Motivational
  if(plan.motivationalNote){chk(18);doc.setFillColor(21,128,61);doc.rect(M,y,W-M*2,16,"F");doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont("helvetica","italic");const ml=doc.splitTextToSize('"'+plan.motivationalNote+'"',W-M*2-8);doc.text(ml,M+4,y+6);doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.text("— "+profile.name+", "+profile.location,W-M,y+14,{align:"right"});y+=20;}

  // Footer
  const pc=doc.internal.getNumberOfPages();
  for(let i=1;i<=pc;i++){doc.setPage(i);doc.setFillColor(240,253,244);doc.rect(0,286,W,11,"F");doc.setTextColor(21,128,61);doc.setFontSize(7);doc.setFont("helvetica","normal");doc.text("DevFit Coach | "+profile.name+" | "+profile.whatsapp+" | "+profile.location,M,291);doc.text("Page "+i+"/"+pc,W-M,291,{align:"right"});}
  doc.save("DevFit_"+form.name.replace(/\s+/g,"_")+"_30DayPlan.pdf");
}

// ── MAIN APP ─────────────────────────────────────────────────
function App(){
  const[lang,setLang]=useState(()=>ls("dfc_lang","mr"));
  const[screen,setScreen]=useState("home");
  const[apiKey,setApiKey]=useState(()=>ls("dfc_groqkey",""));
  const[apiKeyInput,setApiKeyInput]=useState("");
  const[apiKeySaved,setApiKeySaved]=useState(false);
  const[profile,setProfile]=useState(()=>ls("dfc_profile",DP));
  const[profileEdit,setProfileEdit]=useState(()=>ls("dfc_profile",DP));
  const[clients,setClients]=useState(()=>ls("dfc_clients3",[]));
  const[selectedClient,setSelectedClient]=useState(null);
  const[step,setStep]=useState(1);
  const[form,setForm]=useState({name:"",phone:"",age:"",gender:"",height:"",weight:"",goal:"",jobType:"",sleep:"",foodType:"",conditions:[],activity:"",stress:"moderate",water:"1-2L",bodyType:"average",injuries:"none",workoutTime:"any",medications:""});
  const[resultPlan,setResultPlan]=useState(null);
  const[loading,setLoading]=useState(false);
  const[loadMsg,setLoadMsg]=useState("");
  const[planTab,setPlanTab]=useState("diet");
  const[apiError,setApiError]=useState("");
  const[pdfLoading,setPdfLoading]=useState(false);
  const[dailyPlan,setDailyPlan]=useState(null);
  const[dailyDone,setDailyDone]=useState(false);
  const[dailyTab,setDailyTab]=useState("workout");
  const[adminInput,setAdminInput]=useState("");
  const[adminAuth,setAdminAuth]=useState(false);
  const[adminErr,setAdminErr]=useState("");
  const[adminTab,setAdminTab]=useState("clients");

  useEffect(()=>{lsSet("dfc_lang",lang);},[lang]);
  useEffect(()=>{lsSet("dfc_clients3",clients);},[clients]);
  useEffect(()=>{lsSet("dfc_profile",profile);},[profile]);

  const isEN=lang==="en";
  const errRate=isEN?"⏳ Rate limit. Wait 1-2 min and retry.":"⏳ Rate limit. १-२ मिनिट थांबा आणि पुन्हा try करा.";
  const errFail=isEN?"❌ Failed. Check internet.":"❌ चुकी झाली. Internet तपासा.";
  const noKey=isEN?"⚠️ Set API Key in Admin → Settings first.":"⚠️ Admin → Settings मध्ये API Key टाका.";

  function toggleCond(key){const c=form.conditions;if(key==="none"){setForm({...form,conditions:["none"]});return;}const f=c.filter(x=>x!=="none");setForm({...form,conditions:f.includes(key)?f.filter(x=>x!==key):[...f,key]});}
  function canProceed(){
    if(step===1)return form.name&&form.age&&form.gender&&form.height&&form.weight;
    if(step===2)return!!form.goal;
    if(step===3)return form.jobType&&form.sleep&&form.foodType;
    if(step===4)return form.conditions.length>0&&form.activity;
    if(step===5)return form.stress&&form.water&&form.bodyType&&form.workoutTime;
    return false;
  }

  function saveKey(){if(apiKeyInput.trim()){lsSet("dfc_groqkey",apiKeyInput.trim());setApiKey(apiKeyInput.trim());setApiKeySaved(true);setTimeout(()=>setApiKeySaved(false),2500);}}

  async function generateNewPlan(){
    const key=apiKey||ls("dfc_groqkey","");
    if(!key){setApiError(noKey);return;}
    setLoading(true);setApiError("");
    const msgs=["Analysing client profile...","Building personalised diet...","Creating 30-day workout...","Optimising for your health conditions..."];
    let mi=0;setLoadMsg(msgs[0]);
    const iv=setInterval(()=>{mi=(mi+1)%msgs.length;setLoadMsg(msgs[mi]);},2000);
    const bmi=calcBMI(form.height,form.weight);
    const code=genCode();
    const formWithBMI={...form,bmi};
    try{
      const raw=await callGroq(key,buildPlanPrompt(formWithBMI,profile,"beginner","Day 1-30"));
      const parsed=parseJSON(raw);
      const planObj={...parsed,bmi,code,savedAt:new Date().toISOString()};
      setResultPlan(planObj);setPlanTab("diet");
      const newC={id:Date.now(),code,name:form.name,phone:form.phone||"",age:form.age,gender:form.gender,height:form.height,weight:form.weight,goal:form.goal,foodType:form.foodType,conditions:form.conditions,activity:form.activity,stress:form.stress,water:form.water,bodyType:form.bodyType,workoutTime:form.workoutTime,injuries:form.injuries,medications:form.medications,planType:"30day",amount:999,startDate:new Date().toISOString().split("T")[0],status:"active",plan:planObj,completedDays:[],bmi};
      setClients([newC,...clients.filter(c=>c.name!==form.name)]);
      setScreen("plan-result");
    }catch(e){
      setApiError(e.message.includes("RATE_LIMIT")?errRate:errFail+" ("+e.message+")");
      setScreen("new-client");
    }finally{clearInterval(iv);setLoading(false);}
  }

  async function getDailyPlanForClient(client,day){
    const key=apiKey||ls("dfc_groqkey","");
    if(!key){setApiError(noKey);return;}
    setLoading(true);setApiError("");setLoadMsg("Creating Day "+day+" personalised plan...");
    try{
      const raw=await callGroq(key,buildDailyPrompt(client,day,profile));
      const parsed=parseJSON(raw);
      setDailyPlan({...parsed,clientName:client.name,code:client.code});
      setDailyDone(false);setDailyTab("workout");setSelectedClient(client);
      setScreen("daily-result");
    }catch(e){setApiError(e.message.includes("RATE_LIMIT")?errRate:errFail+" ("+e.message+")");}
    finally{setLoading(false);}
  }

  function markDone(code,day){setClients(clients.map(c=>c.code!==code?c:{...c,completedDays:[...new Set([...(c.completedDays||[]),day])]}));}

  function LT(){return <button onClick={()=>setLang(l=>l==="en"?"mr":"en")} style={{background:"rgba(255,255,255,0.2)",border:"2px solid rgba(255,255,255,0.4)",borderRadius:"20px",padding:"6px 14px",color:"#fff",fontWeight:"700",fontSize:"13px",cursor:"pointer"}}>{lang==="en"?"मराठी":"EN"}</button>;}
  function Err(){return apiError?<div className="fade" style={{background:"#fef2f2",border:"1px solid #fecaca",color:"#b91c1c",borderRadius:"12px",padding:"12px 16px",marginBottom:"16px",fontSize:"13px",lineHeight:"1.6"}}>{apiError} <button onClick={()=>setApiError("")} style={{background:"none",border:"none",color:"#b91c1c",cursor:"pointer",fontSize:"12px",textDecoration:"underline",marginLeft:"4px"}}>✕</button></div>:null;}

  if(loading)return(

      <h2 style={{color:"#fff",fontSize:"20px",margin:"0 0 6px",fontWeight:"800"}}>Creating Your Plan</h2>
      <p style={{color:"#d1fae5",fontSize:"14px",minHeight:"22px"}}>{loadMsg}</p>
      <div style={{display:"flex",gap:"8px",marginTop:"20px"}}>{[0,1,2].map(i=><div key={i} style={{width:"10px",height:"10px",borderRadius:"50%",background:"#fff",animation:`bounce 0.8s ${i*0.15}s infinite alternate`}}/>)}</div>

    </div>
  );

  if(screen==="nutrition")return <NutritionScreen apiKey={apiKey} profile={profile} onBack={()=>setScreen("home")}/>;

  if(screen==="home")return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#14532d,#166534,#15803d)",display:"flex",flexDirection:"column",padding:"0 0 32px",color:"#fff",position:"relative"}}>

        <h1 style={{fontSize:"24px",fontWeight:"900",margin:"0 0 4px"}}>{profile.name}</h1>
        <p style={{color:"#86efac",fontSize:"14px",fontWeight:"700",margin:"0 0 3px"}}>{profile.title}</p>
        <p style={{color:"#d1fae5",fontSize:"12px",margin:"0 0 12px"}}>📍 {profile.location}</p>
        {profile.tagline&&<div style={{background:"rgba(255,255,255,0.12)",borderRadius:"12px",padding:"8px 16px",display:"inline-block",fontSize:"13px",color:"#d1fae5",fontStyle:"italic",marginBottom:"12px"}}>"{profile.tagline}"</div>}
        <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:"6px",marginBottom:"12px"}}>
          {["🏋️ "+profile.experience,...(profile.specialization||"").split(",").slice(0,2).map(s=>s.trim())].map((s,i)=><span key={i} style={{background:"rgba(255,255,255,0.15)",borderRadius:"50px",padding:"4px 12px",fontSize:"12px"}}>{s}</span>)}
        </div>
      </div>

      {/* 3 Phase Banner */}
      <div style={{margin:"0 16px 16px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
        {Object.entries(PHASES).map(([k,p])=>(
          <div key={k} style={{background:p.bg,borderRadius:"12px",padding:"10px 6px",textAlign:"center",border:`2px solid ${p.color}30`}}>
            <div style={{fontSize:"11px",fontWeight:"800",color:p.color}}>{p.label}</div>
            <div style={{fontSize:"10px",color:p.color,opacity:0.8}}>{p.duration}</div>
            <div style={{fontSize:"9px",color:"#6b7280",marginTop:"1px"}}>{p.sets}</div>
            <div style={{fontSize:"8px",color:p.color,fontWeight:"600"}}>{p.weight}</div>
          </div>
        ))}
      </div>

      {/* Trust */}
      <div style={{margin:"0 16px 16px",background:"rgba(255,255,255,0.1)",borderRadius:"16px",padding:"12px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          {[["✅","Honest Guidance"],["🥗","Indian Diet"],["📊","Progress Track"],["📄","PDF Download"],["🔬","Nutrition Info"],["🏆","3-Phase System"]].map(([icon,label])=>(
            <div key={label} style={{display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"14px"}}>{icon}</span><span style={{fontSize:"12px",color:"#d1fae5"}}>{label}</span></div>
          ))}
        </div>
      </div>

      {/* Testimonials */}
      <div style={{margin:"0 16px 16px"}}>
        <div style={{fontSize:"12px",color:"#86efac",fontWeight:"700",marginBottom:"8px",textAlign:"center"}}>⭐ Recent Results</div>
        <div style={{display:"flex",gap:"10px",overflowX:"auto",paddingBottom:"4px"}}>
          {[{n:"Rahul D.",r:"-8kg in 30 days",s:"⭐⭐⭐⭐⭐"},{n:"Priya K.",r:"PCOD improved",s:"⭐⭐⭐⭐⭐"},{n:"Suresh J.",r:"BP controlled",s:"⭐⭐⭐⭐⭐"},{n:"Meena S.",r:"Energy up 10x",s:"⭐⭐⭐⭐⭐"}].map((t,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.12)",borderRadius:"12px",padding:"10px 12px",minWidth:"120px",flexShrink:0}}>
              <div style={{fontSize:"11px",fontWeight:"700"}}>{t.n}</div>
              <div style={{fontSize:"10px",color:"#d1fae5",marginTop:"2px"}}>{t.r}</div>
              <div style={{fontSize:"9px",marginTop:"4px"}}>{t.s}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:"10px"}}>
        {!apiKey&&<div style={{background:"rgba(254,243,199,0.95)",borderRadius:"12px",padding:"10px 14px",color:"#92400e",fontSize:"13px"}}>⚠️ {noKey}</div>}
        <button onClick={()=>{setScreen("new-client");setStep(1);setForm({name:"",phone:"",age:"",gender:"",height:"",weight:"",goal:"",jobType:"",sleep:"",foodType:"",conditions:[],activity:"",stress:"moderate",water:"1-2L",bodyType:"average",injuries:"none",workoutTime:"any",medications:""});setApiError("");}} style={{background:"#fff",color:"#15803d",border:"none",borderRadius:"16px",padding:"16px 20px",fontSize:"15px",fontWeight:"800",cursor:"pointer",textAlign:"left",boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>
          🆕 {isEN?"New Client — 30-Day Plan":"नवीन Client — ३०-दिवस Plan"}
          <div style={{fontSize:"12px",fontWeight:"400",color:"#6b7280",marginTop:"2px"}}>Beginner → Intermediate → Advanced</div>
        </button>
        <button onClick={()=>setScreen("client-list")} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"2px solid rgba(255,255,255,0.3)",borderRadius:"16px",padding:"16px 20px",fontSize:"15px",fontWeight:"700",cursor:"pointer",textAlign:"left"}}>
          👥 {isEN?"My Clients — Daily Training":"माझे Clients — Daily Training"}
          <div style={{fontSize:"12px",fontWeight:"400",color:"#d1fae5",marginTop:"2px"}}>{isEN?"Track progress, send daily plans":"Progress track करा, plan द्या"}</div>
        </button>
        <button onClick={()=>setScreen("nutrition")} style={{background:"rgba(124,58,237,0.25)",color:"#ddd6fe",border:"1px solid rgba(124,58,237,0.4)",borderRadius:"16px",padding:"16px 20px",fontSize:"15px",fontWeight:"600",cursor:"pointer",textAlign:"left"}}>
          🔬 Nutrition Info
          <div style={{fontSize:"12px",fontWeight:"400",color:"#c4b5fd",marginTop:"2px"}}>Any food → calories, protein, vitamins, minerals</div>
        </button>
        <button onClick={()=>{setScreen("admin");setAdminAuth(false);setAdminInput("");}} style={{background:"rgba(255,255,255,0.08)",color:"#d1fae5",border:"1px solid rgba(255,255,255,0.2)",borderRadius:"16px",padding:"16px 20px",fontSize:"15px",fontWeight:"600",cursor:"pointer",textAlign:"left"}}>
          🔐 Admin Panel
          <div style={{fontSize:"12px",fontWeight:"400",color:"#86efac",marginTop:"2px"}}>Clients, Revenue, Settings, Profile</div>
        </button>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:"24px",marginTop:"20px"}}>
        {[["₹999","30-Day"],["₹1,499","Monthly"],["3","Phases"]].map(([v,l])=>(
          <div key={l} style={{textAlign:"center"}}><div style={{fontSize:"15px",fontWeight:"800"}}>{v}</div><div style={{fontSize:"11px",color:"#86efac"}}>{l}</div></div>
        ))}
      </div>
    </div>
  );

  // ── NEW CLIENT — 5 STEPS ──
  if(screen==="new-client"){
    const bmi=calcBMI(form.height,form.weight);const bi=bmi?bmiInfo(bmi):null;
    const stepTitles=["Personal Info","Your Goal","Lifestyle & Diet","Health Details","Fitness Profile"];
    const goals=[{k:"weightloss",l:"⚖️ Weight Loss"},{k:"weightgain",l:"💪 Muscle / Weight Gain"},{k:"fitness",l:"🏃 General Fitness"},{k:"diabetes",l:"🩺 Diabetes/BP Management"},{k:"energy",l:"⚡ Energy Boost"},{k:"pcod",l:"🌸 PCOD/Hormonal Health"},{k:"senior",l:"🧓 Senior Fitness (60+)"}];
    const conds=[{k:"none",l:"✅ None"},{k:"diabetes",l:"🩸 Diabetes"},{k:"bp",l:"💊 High BP"},{k:"thyroid",l:"🦋 Thyroid"},{k:"pcod",l:"🔴 PCOD/PCOS"},{k:"knee",l:"🦵 Knee Pain"},{k:"back",l:"🔙 Back Pain"},{k:"gastric",l:"🫃 Gastric"},{k:"heart",l:"❤️ Heart Issue"},{k:"asthma",l:"🫁 Asthma"}];
    return(
      <div style={{minHeight:"100vh",background:"#f8fafc"}}>
        <div style={{background:"linear-gradient(135deg,#14532d,#16a34a)",padding:"18px 16px 14px",color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <div><h2 style={{margin:0,fontSize:"17px",fontWeight:"700"}}>{stepTitles[step-1]}</h2><p style={{margin:0,fontSize:"12px",color:"#86efac"}}>Step {step}/5</p></div><LT/>
          </div>
          <div style={{display:"flex",gap:"4px"}}>{[0,1,2,3,4].map(i=><div key={i} style={{flex:1,height:"4px",borderRadius:"4px",background:i<step?"#fff":"rgba(255,255,255,0.25)"}}/>)}</div>
        </div>
        <div style={{padding:"20px 16px"}}>
          <Err/>
          {step===1&&<div>
            <TI label="Full Name / पूर्ण नाव" type="text" placeholder="e.g. Rahul Deshmukh" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            <TI label="Phone Number (Optional)" type="tel" placeholder="9876543210" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
              <TI label="Age / वय" type="number" placeholder="35" value={form.age} onChange={e=>setForm({...form,age:e.target.value})}/>
              <F label="Gender / लिंग"><div style={{display:"flex",gap:"8px",marginTop:"0"}}>{[{k:"Male",l:"👨 Male"},{k:"Female",l:"👩 Female"}].map(({k,l})=><button key={k} onClick={()=>setForm({...form,gender:k})} style={{flex:1,padding:"11px 4px",border:`2px solid ${form.gender===k?"#16a34a":"#e5e7eb"}`,borderRadius:"12px",background:form.gender===k?"#16a34a":"#fff",color:form.gender===k?"#fff":"#374151",fontWeight:"600",fontSize:"12px",cursor:"pointer"}}>{l}</button>)}</div></F>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
              <TI label="Height (cm)" type="number" placeholder="168" value={form.height} onChange={e=>setForm({...form,height:e.target.value})}/>
              <TI label="Weight (kg)" type="number" placeholder="72" value={form.weight} onChange={e=>setForm({...form,weight:e.target.value})}/>
            </div>
            {bmi&&<div style={{background:"#f0fdf4",borderRadius:"12px",padding:"12px",textAlign:"center",fontSize:"15px",border:`2px solid ${bi.color}40`}}>BMI: <strong>{bmi}</strong> — <strong style={{color:bi.color}}>{bi.label}</strong></div>}
          </div>}

          {step===2&&<div>
            <div style={{background:"#eff6ff",borderRadius:"12px",padding:"10px 14px",marginBottom:"12px",fontSize:"13px",color:"#1e40af"}}>💡 AI will create a personalised 30-day Beginner→Intermediate→Advanced program based on your goal.</div>
            {goals.map(g=><OBtn key={g.k} label={g.l} selected={form.goal===g.k} onClick={()=>setForm({...form,goal:g.k})}/>)}
          </div>}

          {step===3&&<div>
            <Sel label="Work Type / काम कसले?" value={form.jobType} onChange={v=>setForm({...form,jobType:v})} options={[["sedentary","💻 Desk/Office (Sitting all day)"],["standing","🚶 Standing/Walking work"],["physical","🏗️ Heavy physical labour"],["wfh","🏠 Work from home"]]}/>
            <Sel label="Daily Sleep / दररोज झोप" value={form.sleep} onChange={v=>setForm({...form,sleep:v})} options={[["4-5","😴 4-5 hours (Very Less)"],["6","😐 6 hours (Less)"],["7-8","😊 7-8 hours (Good)"],["9+","🌙 9+ hours (Too much)"]]}/>
            <Sel label="Diet Type / आहार पद्धती" value={form.foodType} onChange={v=>setForm({...form,foodType:v})} options={[["veg","🥗 Pure Vegetarian"],["jain","🙏 Jain (no root veg)"],["eggetarian","🥚 Eggetarian"],["nonveg","🍗 Non-Vegetarian"],["vegan","🌱 Vegan"]]}/>
          </div>}

          {step===4&&<div>
            <F label="Health Conditions / आरोग्य समस्या" sub="Select all that apply">
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{conds.map(c=><Chip key={c.k} label={c.l} selected={form.conditions.includes(c.k)} onClick={()=>toggleCond(c.k)}/>)}</div>

            <Sel label="Current Physical Activity" value={form.activity} onChange={v=>setForm({...form,activity:v})} options={[["none","🛋️ No exercise at all"],["walk","🚶 Only walking (casual)"],["yoga","🧘 Yoga / Pranayama only"],["gym_beginner","💪 Gym — just started (< 3 months)"],["gym_regular","🏋️ Gym — regular (3-12 months)"],["gym_advanced","🏆 Gym — advanced (1+ years)"],["sports","⚽ Sports / Running / Cycling"]]}/>
            <TI label="Previous Injuries (if any)" sub="e.g. knee surgery 2020, shoulder pain" type="text" placeholder="None" value={form.injuries} onChange={e=>setForm({...form,injuries:e.target.value})}/>
            <TI label="Current Medications (if any)" sub="This helps create a safe plan" type="text" placeholder="None" value={form.medications} onChange={e=>setForm({...form,medications:e.target.value})}/>
          </div>}

          {step===5&&<div>
            <Sel label="Stress Level / तणाव पातळी" sub="Affects cortisol, weight, and recovery" value={form.stress} onChange={v=>setForm({...form,stress:v})} options={[["low","😊 Low — generally relaxed"],["moderate","😐 Moderate — some daily stress"],["high","😰 High — very stressed daily"],["very_high","😱 Very High — chronic stress/anxiety"]]}/>
            <Sel label="Daily Water Intake / पाणी" value={form.water} onChange={v=>setForm({...form,water:v})} options={[["less_1L","😟 Less than 1 litre (very less)"],["1-2L","😊 1-2 litres"],["2-3L","👍 2-3 litres (good)"],["3L+","💧 3+ litres (excellent)"]]}/>
            <Sel label="Body Type / शरीराचा प्रकार" sub="Helps determine metabolism and diet" value={form.bodyType} onChange={v=>setForm({...form,bodyType:v})} options={[["ectomorph","🪶 Thin/Lean — hard to gain weight (Ectomorph)"],["mesomorph","💪 Athletic/Medium build (Mesomorph)"],["endomorph","🌊 Stocky/Easy to gain weight (Endomorph)"],["skinny_fat","⚠️ Skinny fat — thin but soft body"]]}/>
            <Sel label="Preferred Workout Time" value={form.workoutTime} onChange={v=>setForm({...form,workoutTime:v})} options={[["early_morning","🌅 Early morning (5-7 AM)"],["morning","🌞 Morning (7-9 AM)"],["afternoon","☀️ Afternoon (12-2 PM)"],["evening","🌆 Evening (5-7 PM)"],["night","🌙 Night (8-10 PM)"],["any","⚡ Flexible / Any time"]]}/>
            <div style={{background:"#f0fdf4",borderRadius:"12px",padding:"12px 14px",fontSize:"13px",color:"#15803d"}}>
              ✅ {isEN?"All set! AI will create your complete 30-day personalised program.":"सगळे ready! AI तुमचा complete ३०-दिवस personalized program तयार करेल."}
            </div>
          </div>}

          <div style={{display:"flex",gap:"10px",marginTop:"20px"}}>
            <button onClick={()=>step>1?setStep(step-1):setScreen("home")} style={{flex:1,background:"#f3f4f6",border:"none",borderRadius:"14px",padding:"15px",color:"#6b7280",fontSize:"15px",fontWeight:"600",cursor:"pointer"}}>{isEN?"← Back":"← मागे"}</button>

            :<button onClick={()=>canProceed()&&generateNewPlan()} disabled={!canProceed()} style={{flex:2,border:"none",borderRadius:"14px",padding:"15px",fontSize:"15px",fontWeight:"700",cursor:canProceed()?"pointer":"not-allowed",background:canProceed()?"#15803d":"#d1d5db",color:"#fff"}}>🚀 {isEN?"Create My 30-Day Plan!":"Plan तयार करा!"}</button>}
          </div>
        </div>
      </div>
    );
  }

  // ── PLAN RESULT ──
  if(screen==="plan-result"&&resultPlan){
    const bi=bmiInfo(resultPlan.bmi);const code=resultPlan.code||"—";
    const waMsg=`Hello ${form.name}!\nYour 30-Day DevFit Program is ready!\nCode: ${code} | Goal: ${GK[form.goal]||form.goal} | BMI: ${resultPlan.bmi}\nPhase 1 (Day 1-10): Beginner\nPhase 2 (Day 11-20): Intermediate\nPhase 3 (Day 21-30): Advanced\nI'll send you each day's plan daily!\nQuestions? WhatsApp: ${profile.whatsapp}\n— ${profile.name}`;
    return(
      <div style={{background:"#f8fafc",minHeight:"100vh",paddingBottom:"32px"}}>
        <div style={{background:"linear-gradient(135deg,#14532d,#16a34a)",padding:"20px 16px",color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}><div style={{fontSize:"32px"}}>🎉</div><div><h1 style={{margin:0,fontSize:"17px",fontWeight:"700"}}>{form.name} — 30-Day Plan Ready!</h1><p style={{margin:0,fontSize:"12px",color:"#86efac"}}>{profile.name} • Saved ✅</p></div></div><LT/>
          </div>
          <div style={{background:"rgba(255,255,255,0.15)",borderRadius:"14px",padding:"12px",textAlign:"center",marginBottom:"12px"}}>
            <div style={{fontSize:"11px",color:"#d1fae5",marginBottom:"3px"}}>🔑 Client Code</div>
            <div style={{fontSize:"26px",fontWeight:"900",letterSpacing:"6px"}}>{code}</div>
          </div>
          <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
            {[["BMI",resultPlan.bmi],["Status",bi.label],["Cal/day",resultPlan.calorieTarget||"—"]].map(([l,v])=>(
              <div key={l} style={{flex:1,background:"rgba(255,255,255,0.12)",borderRadius:"10px",padding:"8px 4px",textAlign:"center"}}><div style={{fontSize:"13px",fontWeight:"700"}}>{v}</div><div style={{fontSize:"9px",color:"rgba(255,255,255,0.7)"}}>{l}</div></div>
            ))}
          </div>
          <div style={{display:"flex",gap:"6px"}}>
            {Object.entries(PHASES).map(([k,p])=><div key={k} style={{flex:1,background:p.bg,borderRadius:"8px",padding:"6px",textAlign:"center"}}><div style={{fontSize:"10px",fontWeight:"700",color:p.color}}>{p.label}</div><div style={{fontSize:"9px",color:p.color,opacity:0.8}}>{p.days}</div></div>)}
          </div>
          {resultPlan.summary&&<p style={{fontSize:"13px",color:"#d1fae5",marginTop:"10px",lineHeight:"1.5"}}>💡 {resultPlan.summary}</p>}
        </div>

        <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #e5e7eb"}}>
          {[["diet","🥗 Diet"],["workout","🏋️ Workout"],["tips","📋 Rules"],["phases","📅 Phases"]].map(([k,lb])=>(
            <button key={k} onClick={()=>setPlanTab(k)} style={{flex:1,padding:"12px 2px",border:"none",background:"none",fontSize:"11px",fontWeight:planTab===k?"700":"500",color:planTab===k?"#15803d":"#6b7280",borderBottom:`2px solid ${planTab===k?"#15803d":"transparent"}`,cursor:"pointer",marginBottom:"-2px"}}>{lb}</button>
          ))}
        </div>
        <div style={{padding:"16px"}}>
          {planTab==="diet"&&<div>
            <div style={{background:"#fef3c7",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",fontSize:"13px",color:"#92400e"}}>📌 Daily diet plan. Follow every day throughout all 30 days.</div>
            <div style={{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
                  <thead><tr style={{background:"#f0fdf4"}}>{["Time","Meal","Food","Qty","Cal"].map((h,i)=><th key={i} style={{padding:"10px 8px",textAlign:"left",fontWeight:"700",color:"#15803d",borderBottom:"2px solid #d1fae5",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                  <tbody>{(resultPlan.dietTable||[]).map((row,i)=><tr key={i} style={{background:i%2===0?"#fff":"#f9fafb",borderBottom:"1px solid #f3f4f6"}}>
                    <td style={{padding:"9px 8px",color:"#6b7280",whiteSpace:"nowrap",fontSize:"11px"}}>{row.time}</td>
                    <td style={{padding:"9px 8px",fontWeight:"600",color:"#374151",whiteSpace:"nowrap"}}>{row.meal}</td>
                    <td style={{padding:"9px 8px",color:"#374151",lineHeight:"1.4"}}>{row.food}</td>
                    <td style={{padding:"9px 8px",color:"#6b7280",whiteSpace:"nowrap",fontSize:"11px"}}>{row.quantity}</td>
                    <td style={{padding:"9px 8px",color:"#16a34a",fontWeight:"700",whiteSpace:"nowrap",fontSize:"11px"}}>{row.calories}</td>
                  </tr>)}</tbody>
                </table>
              </div>
            </div>
          </div>}

          {planTab==="workout"&&<div>
            <div style={{background:"#eff6ff",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",fontSize:"13px",color:"#1e40af"}}>📌 Full 30-day workout schedule. Follow as per your current phase.</div>

        <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #e5e7eb"}}>
          {[["clients","👥 Clients"],["profile","👤 Profile"],["settings","⚙️ Settings"]].map(([k,lb])=>(
            <button key={k} onClick={()=>setAdminTab(k)} style={{flex:1,padding:"12px 4px",border:"none",background:"none",fontSize:"12px",fontWeight:adminTab===k?"700":"500",color:adminTab===k?"#15803d":"#6b7280",borderBottom:`2px solid ${adminTab===k?"#15803d":"transparent"}`,cursor:"pointer",marginBottom:"-2px"}}>{lb}</button>
          ))}
        </div>
        <div style={{padding:"16px"}}>
          {adminTab==="clients"&&<div>
            <button onClick={()=>setScreen("client-list")} style={{width:"100%",background:"#1e40af",border:"none",borderRadius:"14px",padding:"14px",color:"#fff",fontWeight:"700",fontSize:"15px",cursor:"pointer",marginBottom:"16px"}}>📅 Open Training Center</button>
            {clients.map(c=>{const d=Math.min(daysSince(c.startDate||new Date().toISOString().split("T")[0]),30);const pct=Math.round((c.completedDays||[]).length/30*100);return(
              <div key={c.id} style={{background:"#fff",borderRadius:"14px",padding:"14px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:"10px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
                  <div><div style={{fontWeight:"700",fontSize:"15px"}}>{c.name}</div><div style={{fontSize:"12px",color:"#6b7280"}}>{GK[c.goal]||c.goal} • Age: {c.age} • {c.gender}</div><div style={{fontSize:"11px",color:"#9ca3af"}}>🔑 {c.code} • Day {d}/30</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:"14px",fontWeight:"700",color:"#15803d"}}>₹{parseFloat(c.amount||999).toLocaleString()}</div><div style={{fontSize:"11px",color:"#3b82f6"}}>{pct}% done</div></div>
                </div>
                <div style={{background:"#f3f4f6",borderRadius:"6px",height:"6px",overflow:"hidden",marginBottom:"10px"}}><div style={{background:pct>=66?"#dc2626":pct>=33?"#f97316":"#16a34a",height:"100%",width:pct+"%",borderRadius:"6px"}}/></div>
                <button onClick={()=>getDailyPlanForClient(c,d)} style={{width:"100%",background:"#1e40af",border:"none",borderRadius:"10px",padding:"10px",color:"#fff",fontWeight:"600",fontSize:"13px",cursor:"pointer"}}>📅 Send Day {d} Plan</button>
              </div>
            );})}
          </div>}
          {adminTab==="profile"&&<div>
            <div style={{background:"#fff",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:"12px"}}>
              <h3 style={{margin:"0 0 14px",fontSize:"15px"}}>👤 Coach Profile</h3>
              {[["Name",profileEdit.name,v=>setProfileEdit({...profileEdit,name:v})],["Title",profileEdit.title,v=>setProfileEdit({...profileEdit,title:v})],["Location",profileEdit.location,v=>setProfileEdit({...profileEdit,location:v})],["Experience",profileEdit.experience,v=>setProfileEdit({...profileEdit,experience:v})],["Specialization",profileEdit.specialization,v=>setProfileEdit({...profileEdit,specialization:v})],["WhatsApp",profileEdit.whatsapp,v=>setProfileEdit({...profileEdit,whatsapp:v})],["Tagline",profileEdit.tagline,v=>setProfileEdit({...profileEdit,tagline:v})]].map(([lb,val,setter])=>(
                <div key={lb} style={{marginBottom:"12px"}}><div style={{fontSize:"13px",fontWeight:"700",color:"#374151",marginBottom:"5px"}}>{lb}</div><input type="text" value={val||""} onChange={e=>setter(e.target.value)} style={{width:"100%",border:"2px solid #e5e7eb",borderRadius:"10px",padding:"10px 12px",fontSize:"14px",outline:"none",boxSizing:"border-box"}}/></div>
              ))}
              <button onClick={()=>{setProfile({...profileEdit});lsSet("dfc_profile",profileEdit);alert("✅ Profile Saved!");}} style={{width:"100%",background:"#15803d",border:"none",borderRadius:"12px",padding:"14px",color:"#fff",fontWeight:"700",fontSize:"15px",cursor:"pointer"}}>✅ Save Profile</button>
            </div>
          </div>}
          {adminTab==="settings"&&<div>
            <div style={{background:"#fff",borderRadius:"16px",padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
              <h3 style={{margin:"0 0 6px",fontSize:"15px"}}>🔑 Groq API Key (Free)</h3>
              <p style={{fontSize:"13px",color:"#6b7280",marginBottom:"12px"}}>Free! No credit card. 14,400 requests/day.</p>
              {apiKey&&<div style={{background:"#f0fdf4",border:"1px solid #d1fae5",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",fontSize:"13px",color:"#15803d"}}>✅ Key active ({apiKey.slice(0,12)}...)</div>}
              <input type="password" placeholder="gsk_..." value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} style={{width:"100%",border:"2px solid #e5e7eb",borderRadius:"12px",padding:"12px 14px",fontSize:"14px",outline:"none",boxSizing:"border-box",marginBottom:"10px"}}/>
              <button onClick={saveKey} style={{width:"100%",background:"#1e40af",border:"none",borderRadius:"12px",padding:"13px",color:"#fff",fontWeight:"700",fontSize:"15px",cursor:"pointer"}}>{apiKeySaved?"✅ Saved!":"Save Key"}</button>
              <div style={{background:"#f0fdf4",borderRadius:"12px",padding:"14px",marginTop:"14px"}}>
                <div style={{fontWeight:"700",color:"#15803d",marginBottom:"10px",fontSize:"14px"}}>✅ Get Free Groq Key (2 min):</div>
                {[["1","Open: console.groq.com"],["2","Sign Up — Email only, free!"],["3",'"API Keys" → "Create API Key"'],["4","Copy key (starts with gsk_...)"],["5","Paste above → Save Key"],["6","✅ Done! No rate limits."]].map(([n,s])=>(
                  <div key={n} style={{display:"flex",gap:"10px",alignItems:"flex-start",marginBottom:"8px"}}>
                    <div style={{width:"22px",height:"22px",borderRadius:"50%",background:"#16a34a",color:"#fff",fontSize:"12px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div>
                    <span style={{fontSize:"13px",color:"#374151",lineHeight:"1.5"}}>{s}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>}
        </div>
      </div>
    );
  }
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
